<!DOCTYPE html>
<!-- GWC LEDD — TMS + VTS Desktop Prototype v41
     Single-file clickable mockup. In-memory state only (no browser storage).
     Brand: GWC green #3FAE2A, cyan #00ABC7. Bilingual EN/AR (RTL). For demonstration only. -->
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GWC TMS - Prototype v72</title>
<style>
:root{
  --green:#3FAE2A; --green-d:#2f8a1f; --cyan:#00ABC7; --cyan-d:#0089a0;
  --ink:#0e2730; --ink2:#15333d; --sidebar:#1a7896; --sidebar2:#115f73;
  --bg:#e8f4f7; --card:#ffffff; --line:#d8edf2; --txt:#1f2d33; --mut:#6c7c83;
  --amber:#f5a623; --red:#e2473d; --blue:#2f86d6; --grey:#9aa7ad;
  --shadow:0 1px 2px rgba(14,39,48,.06),0 6px 18px rgba(14,39,48,.06);
  --radius:14px;
  --font:'Proxima Nova','Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:13px;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
/* ---------- Sidebar ---------- */
.sidebar{width:220px;background:linear-gradient(180deg,var(--sidebar),var(--sidebar2));color:#cfe0e4;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex:0 0 220px}
.brand{padding:16px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px}
.brand img{height:30px}
.brand .sub{font-size:10px;letter-spacing:.16em;color:var(--cyan);font-weight:700;margin-top:3px}
.navwrap{overflow-y:auto;overflow-x:hidden;padding:8px 10px 20px;flex:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.navgrp{margin-top:14px}
.navgrp .lbl{font-size:10px;letter-spacing:.16em;color:#6f8a92;font-weight:700;padding:6px 12px;text-transform:uppercase}
.navi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;color:#bcd0d6;font-weight:500;margin:2px 0;transition:.15s;white-space:nowrap}
.navi:hover{background:rgba(255,255,255,.06);color:#fff}
.navi.on{background:linear-gradient(90deg,rgba(63,174,42,.22),rgba(0,171,199,.16));color:#fff;box-shadow:inset 3px 0 0 var(--green)}
.navi .ic{width:16px;height:16px;flex:0 0 16px;opacity:.95}
.navi.on .ic{opacity:1}
.sidefoot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:10.5px;color:#6f8a92}
/* ---------- Topbar ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:56px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 18px;position:sticky;top:0;z-index:20}
.crumb{font-weight:700;font-size:16px;color:var(--ink)}
.crumb small{display:block;font-weight:500;font-size:11px;color:var(--mut)}
.search{margin-inline-start:auto;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:7px 10px;width:252px;color:var(--mut)}
.search input{border:0;background:none;outline:0;width:100%;font-family:inherit;font-size:13px;color:var(--txt)}
.tbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);position:relative}
.tbtn:hover{background:var(--bg)}
.lang{font-weight:700;font-size:12px;letter-spacing:.04em}
.dot-badge{position:absolute;top:7px;inset-inline-end:8px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid #fff}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
/* ---------- Content ---------- */
.content{padding:18px 20px 20px;overflow:auto;flex:1;display:flex;flex-direction:column}
.row{display:flex;gap:12px;flex-wrap:wrap}
.grid{display:grid;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.card-h{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
.card-h h3{margin:0;font-size:14px;color:var(--ink)}
.card-h .act{margin-inline-start:auto;display:flex;gap:8px}
.kpi{flex:1;min-width:136px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:11px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .v{font-size:24px;font-weight:800;color:var(--ink);line-height:1.08}
.kpi .l{font-size:12px;color:var(--mut);margin-top:3px}
.kpi .d{font-size:11px;font-weight:700;margin-top:8px}
.kpi .bar{position:absolute;top:0;inset-inline-start:0;width:4px;height:100%}
.up{color:var(--green)} .down{color:var(--red)}
.ind-up{color:#2e7d32;font-weight:700} .ind-dn{color:#c62828;font-weight:700}
.cell-pos{background:#e8f5e9} .cell-neg{background:#fce4ec}
.arr-up::before{content:"▲ "} .arr-dn::before{content:"▼ "}
.btn{border:0;border-radius:9px;padding:8px 13px;font-weight:700;font-size:11.5px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px}
.btn.p{background:var(--green);color:#fff} .btn.p:hover{background:var(--green-d)}
.btn.c{background:var(--cyan);color:#fff} .btn.c:hover{background:var(--cyan-d)}
.btn.g{background:var(--bg);color:var(--ink);border:1px solid var(--line)} .btn.g:hover{background:#e6ebed}
table{width:100%;border-collapse:collapse}
th{text-align:start;font-size:10.5px;letter-spacing:.04em;color:#fff;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--line);background:#1a6b7c;font-weight:700;position:sticky;top:0;z-index:2}
td{padding:7px 12px;border-bottom:1px solid var(--line);font-size:12.5px}
tr:last-child td{border-bottom:0}
tr.click{cursor:pointer} tr.click:hover{background:#f6fbf8}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.chip .cd{width:6px;height:6px;border-radius:50%}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:var(--bg);color:var(--mut);white-space:nowrap}
.pill{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--mut)}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.muted{color:var(--mut)}
.flex{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mt{margin-top:12px}.mb{margin-bottom:12px}
h2.sec{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:4px 0 0}
/* progress */
.prog{height:7px;border-radius:6px;background:var(--bg);overflow:hidden}
.prog > i{display:block;height:100%;border-radius:6px}
/* timeline */
.tl{position:relative;padding-inline-start:22px}
.tl:before{content:"";position:absolute;inset-inline-start:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl .ev{position:relative;padding:0 0 16px}
.tl .ev:before{content:"";position:absolute;inset-inline-start:-19px;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid var(--green)}
.tl .ev.cyan:before{border-color:var(--cyan)} .tl .ev.mut:before{border-color:var(--grey)}
.tl .t{font-weight:700;font-size:13px} .tl .s{font-size:12px;color:var(--mut)}
/* map */
.map{position:relative;height:520px;border-radius:var(--radius);overflow:hidden;background:
  radial-gradient(1100px 500px at 70% -10%,#13343f,#0c242c);border:1px solid var(--line)}
.map .roads line{stroke:rgba(255,255,255,.10);stroke-width:2}
.map .roads .hw{stroke:rgba(0,171,199,.30);stroke-width:3}
.zone{position:absolute;color:#5d7d86;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.veh{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:3}
.veh .pin{width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 4px rgba(255,255,255,.08)}
.veh.sel .pin{box-shadow:0 0 0 5px rgba(63,174,42,.5)}
.veh .pulse{position:absolute;inset:-4px;border-radius:50%;opacity:.55;animation:pulse 2.4s infinite ease-out}
@keyframes pulse{0%{transform:scale(.6);opacity:.6}100%{transform:scale(2.6);opacity:0}}
.mapcard{position:absolute;inset-inline-end:14px;top:14px;width:280px;background:rgba(12,36,44,.92);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#dceaed;padding:14px;z-index:5}
.maplegend{position:absolute;inset-inline-start:14px;bottom:14px;background:rgba(12,36,44,.85);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;color:#cfe0e4;font-size:11px;z-index:5;display:flex;gap:14px;flex-wrap:wrap}
.maplegend .li{display:flex;align-items:center;gap:6px}
.maplegend .cd{width:9px;height:9px;border-radius:50%}
/* drawer */
.scrim{position:fixed;inset:0;background:rgba(14,39,48,.4);z-index:40;display:none}
.scrim.on{display:block}
.drawer{position:fixed;top:0;inset-inline-end:0;height:100vh;width:min(520px,96vw);max-width:94vw;background:var(--bg);z-index:50;box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:.25s;overflow:auto}
html[dir=rtl] .drawer{transform:translateX(-100%)}
.drawer.on{transform:none}
.drawer .dh{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;gap:10px;z-index:2}
.drawer .db{padding:18px 20px}
.x{margin-inline-start:auto;cursor:pointer;color:var(--mut);font-size:20px;line-height:1;border:0;background:none}
.kv{display:grid;grid-template-columns:130px 1fr;gap:8px 12px;font-size:13px}
.kv .k{color:var(--mut)}
.bars{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:10px}
.bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%}
.bars .b .bar{width:60%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--cyan),var(--green))}
.bars .b small{font-size:10px;color:var(--mut)}
.note{font-size:11px;color:var(--mut);margin-top:8px}
.banner{background:linear-gradient(90deg,rgba(0,171,199,.10),rgba(63,174,42,.08));border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:12px;color:var(--ink2);display:flex;gap:10px;align-items:center}
.alert{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);align-items:flex-start}
.alert:last-child{border-bottom:0}
.alert .ad{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 8px}
.alert .at{font-weight:700;font-size:12.5px} .alert .as{font-size:11.5px;color:var(--mut)}
.alert .tm{margin-inline-start:auto;font-size:11px;color:var(--grey);white-space:nowrap}
@media(max-width:1080px){.sidebar{display:none}}
/* ---------- Modal ---------- */
.modal-scrim{position:fixed;inset:0;background:rgba(14,39,48,.58);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
.modal,.modal-card{background:#fff;border:1px solid #d8edf2;border-radius:18px;box-shadow:0 28px 90px rgba(0,0,0,.22),0 10px 28px rgba(14,39,48,.10);width:100%;overflow:hidden;opacity:1}
.modal{max-width:480px}
.modal-card{position:relative}
.modal.sm{max-width:380px}
.modal-h,.modal-head{padding:16px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;background:#fff}
.modal-h h3{margin:0;font-size:16px;color:var(--ink)}
.modal-head b{display:block;font-size:16px;color:var(--ink)}
.modal-b{padding:20px;background:#fff}
.frow{display:grid;gap:14px;margin-bottom:14px}
.frow.two{grid-template-columns:1fr 1fr}
.frow.three{grid-template-columns:1fr 1fr 1fr}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.finput{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--card);outline:none;transition:.15s}
.finput:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,171,199,.12)}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#fff}
/* ---------- Plan result banner ---------- */
.plan-result{border-radius:10px;padding:10px 16px;font-size:12.5px;margin-bottom:14px;display:flex;gap:12px;align-items:center}
.plan-result>b{white-space:nowrap}
.plan-result.ok{background:rgba(63,174,42,.07);border:1px solid var(--green);color:var(--ink)}
.plan-result.info{background:rgba(0,171,199,.07);border:1px solid var(--cyan);color:var(--ink)}
.assign-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--bg);border:1px solid var(--line);margin:2px}
/* ---------- Orders search ---------- */
.ord-search{position:relative;flex:1;max-width:320px}
.ord-search input{width:100%;padding:8px 11px 8px 32px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--txt);background:var(--card);outline:none}
.ord-search input:focus{border-color:var(--cyan)}
.ord-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none;font-size:14px}
/* ---- Planning stats bar ---- */
.plan-stats{display:flex;gap:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;flex-wrap:wrap}
.pstat{flex:1;padding:10px 14px;text-align:center;border-right:1px solid var(--line);min-width:90px}
.pstat:last-child{border-right:0}
.pstat .pv{font-size:17px;font-weight:800;color:#1a6b7c;line-height:1.2}
.pstat .pvsub{font-size:9px;color:var(--mut);font-weight:600;letter-spacing:.03em}
.pstat .pl{font-size:10px;color:var(--mut);margin-top:2px}
/* ---- Plan tabs ---- */
.plan-tab{padding:8px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:600;color:var(--mut);transition:.12s}
.plan-tab.on{border-bottom-color:#1a6b7c;color:#1a6b7c;font-weight:700}
/* ---- Gantt Timeline ---- */
.gantt-wrap{border-radius:var(--radius);border:1px solid var(--line);background:var(--card);overflow:hidden}
.gantt-head{display:flex;border-bottom:1px solid var(--line);background:#fafbfb}
.gantt-info-h{width:240px;flex:0 0 240px;padding:6px 12px;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;border-right:1px solid var(--line)}
.gantt-ruler{flex:1;display:flex;overflow:hidden}
.gantt-tick{flex:1;text-align:center;font-size:10px;color:var(--mut);font-weight:700;padding:6px 0;border-left:1px solid var(--line)}
.gtour{display:flex;align-items:center;border-bottom:1px solid var(--line);cursor:pointer}
.gtour:last-child{border-bottom:0}
.gtour:hover{background:#f6fbf8}
.gtour-info{width:240px;flex:0 0 240px;padding:8px 12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--line)}
.gtour-track{flex:1;position:relative;height:46px;background:#fafbfb;overflow:hidden}
.gtour:hover .gtour-track{background:#f0faf4}
.gblock{position:absolute;top:9px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;z-index:2;overflow:hidden;min-width:20px;transition:.1s}
.gblock:hover{filter:brightness(1.12);transform:scaleY(1.07);z-index:3}
/* ---- Executed vs Planned strip ---- */
.xp-wrap{background:var(--bg);border-radius:10px;padding:14px;overflow-x:auto}
.xp-ruler-row{display:flex;margin-left:90px;margin-bottom:4px}
.xp-ruler-tick{flex:1;font-size:10px;color:var(--mut);font-weight:700;text-align:center;min-width:44px}
.xp-row{display:flex;align-items:center;margin-bottom:8px}
.xp-row:last-child{margin-bottom:0}
.xp-lbl{width:90px;font-size:11px;font-weight:700;color:var(--mut);white-space:nowrap}
.xp-track{flex:1;position:relative;height:32px;min-width:440px}
.xp-block{position:absolute;top:4px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;cursor:pointer}
/* ---- Driver Roster ---- */
.roster-wrap{overflow-x:auto}
.roster-tbl{border-collapse:collapse;width:100%;min-width:920px}
.roster-tbl th{background:#1a6b7c;color:#fff;padding:10px 12px;font-size:11px;font-weight:700;text-align:start;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap}
.roster-tbl td{padding:5px 7px;border:1px solid var(--line);background:var(--card);vertical-align:top;min-width:110px}
.roster-tbl td.rname{min-width:170px;background:#fafbfb}
.rshift{border-radius:7px;padding:5px 8px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:4px;user-select:none}
.rshift.ms{background:#dbeafe;color:#1d4ed8}
.rshift.es{background:#fef3c7;color:#b45309}
.rshift.ns{background:#ede9fe;color:#6d28d9}
.rshift.off{background:var(--bg);color:var(--mut);font-style:italic}
.rshift .rbtn{font-size:12px;border:0;background:none;cursor:pointer;color:inherit;opacity:.5;padding:0 2px;line-height:1}
.rshift .rbtn:hover{opacity:1}
/* ===== Order Creation Wizard ===== */
.wiz-modal{max-width:880px;width:96vw;max-height:93vh;display:flex;flex-direction:column;overflow:hidden}
.wdot{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:.15s;flex:0 0 26px}
.wdot.done{background:#1a6b7c;color:#fff}.wdot.active{background:#3FAE2A;color:#fff;box-shadow:0 0 0 4px #3fae2a25}.wdot.todo{background:var(--bg);border:2px solid var(--line);color:var(--mut)}
.wlbl{font-size:9px;font-weight:600;white-space:nowrap;color:var(--mut)}.wlbl.active{color:#3FAE2A;font-weight:700}
.wconn{width:16px;height:2px;flex:0 0 16px;border-radius:1px;background:var(--line)}.wconn.done{background:#1a6b7c}
.wiz-body{flex:1;overflow-y:auto;padding:20px 24px}
.wiz-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card)}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-top:10px}
.svc-card{border:2px solid var(--line);border-radius:12px;padding:18px 10px;text-align:center;cursor:pointer;transition:.15s;background:var(--card);position:relative}
.svc-card:hover{border-color:#1a6b7c;transform:translateY(-2px);box-shadow:0 4px 12px #0002}
.svc-card.sel{border-color:#3FAE2A;background:linear-gradient(135deg,#f0fff4,#e8fbed)}
.svc-card.sel::after{content:"✓";position:absolute;top:6px;right:8px;color:#3FAE2A;font-weight:800;font-size:13px}
.svc-card .sci{font-size:28px;display:block;margin-bottom:7px;line-height:1}
.svc-card .scl{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.3}
.svc-card .scs{font-size:10px;color:var(--mut);margin-top:3px}
.cargo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:7px;margin-top:10px}
.cargo-chip{border:2px solid var(--line);border-radius:8px;padding:9px 5px;text-align:center;cursor:pointer;transition:.12s;background:var(--card)}
.cargo-chip:hover{border-color:#00ABC7}.cargo-chip.sel{border-color:#00ABC7;background:#e0f7fa}
.cargo-chip .cci{font-size:18px;margin-bottom:3px;display:block}.cargo-chip .ccl{font-size:11px;font-weight:600;color:var(--ink)}
.equip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:7px;margin-top:8px}
.equip-card{border:2px solid var(--line);border-radius:8px;padding:9px 6px;text-align:center;cursor:pointer;transition:.12s;font-size:11px;font-weight:600;color:var(--ink);background:var(--card)}
.equip-card:hover{border-color:#1a6b7c}.equip-card.sel{border-color:#1a6b7c;background:#e6f3f5;color:#1a6b7c}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.act-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;transition:.12s;font-size:11.5px}

function vControl(){

  const totalOrders=ORDERS.length,totalVeh=VEH.length,activeVeh=fs.transit+fs.loading;
  const otifPct=Math.min(99,Math.max(91,97-os.delayed)),utilPct=Math.round(activeVeh/totalVeh*100);

    {sev:"Critical",item:"Missing contract",cnt:ORDERS.filter((o,i)=>i%11===0).length,owner:"Commercial"},

    {sev:"Medium",item:"POD pending",cnt:Math.max(4,Math.round(os.delivered*.35)),owner:"Billing"},
    {sev:"Medium",item:"Driver hours risk",cnt:DRV.filter(d=>d.hrs>=9).length,owner:"Safety"},

  <div class="grid" style="grid-template-columns:1.35fr 1fr;gap:16px"><div class="card"><div class="card-h"><h3>Zone Load</h3><span class="tag">demand by destination</span></div><div class="pad">${zoneCounts.map(z=>`<div style="margin-bottom:9px"><div class="between"><span>${z.z}</span><b>${z.v}</b></div><div class="prog mt" style="margin-top:4px"><i style="width:${Math.round(z.v/maxZone*100)}%;background:${ZONE_COLOR[z.z]||'#1a7896'}"></i></div></div>`).join("")}</div></div><div class="card"><div class="card-h"><h3>Executive Summary</h3></div><div class="pad" style="font-size:12.5px;line-height:1.7"><b>${os.unassigned}</b> orders need planning, <b>${os.delayed}</b> trips are at SLA risk, <b>${fs.idle}</b> trucks are idle, and estimated revenue exposure is <b>QAR ${revRisk.toLocaleString()}</b>. Priority: clear validation blockers, run planning, then dispatch ready orders.</div></div></div>`;

.util/100)).toFixed(1)}t</td><td>${v.zone}</td></tr>`).join("")}</tbody></table></div></div><div class="card"><div class="card-h"><h3>Planning Exceptions</h3><span class="tag">auto checks</span></div><table><thead><tr><th>Rule</th><th>Count</th><th>Action</th></tr></thead><tbody>${[["Missing contract",5,"Commercial"],["Outside time window",7,"Reschedule"],["No matching reefer",2,"Fleet"],["Driver hours risk",DRV.filter(d=>d.hrs>=9).length,"Safety"],["Permit / document missing",4,"Validate"]].map(x=>`<tr><td><b>${x[0]}</b></td><td>${x[1]}</td><td><span class="tag">${x[2]}</span></td></tr>`).join("")}</tbody></table></div><div class="card"><div class="card-h"><h3>Dispatch Readiness</h3></div><div class="pad">${[["Driver assigned",82],["Vehicle assigned",78],["Route optimized",assignedCount?95:25],["Mobile job sent",_dispatched?88:12],["Customer notified",_dispatched?70:20]].map(x=>`<div style="margin-bottom:9px"><div class="between"><span>${x[0]}</span><b>${x[1]}%</b></div><div class="prog mt" style="margin-top:4px"><i style="width:${x[1]}%;background:${x[1]>70?'#3FAE2A':'#f5a623'}"></i></div></div>`).join("")}</div></div></div></div>`;

/* Zone colour map + tour colour palette */
const ZONE_COLOR={"Doha Central":"#1a6b7c","West Bay / Lusail":"#3FAE2A","Industrial Area":"#00ABC7","Al Wakrah":"#f5a623","Hamad Port":"#2f86d6","Al Rayyan":"#9c27b0","Mesaieed":"#e2473d"};
const TOUR_COLORS=["#1a6b7c","#3FAE2A","#00ABC7","#f5a623","#2f86d6","#9c27b0","#e2473d","#00897b","#d32f2f","#1976d2","#388e3c","#f57c00","#5d4037","#0097a7","#c2185b","#689f38"];
const ZONE_COORDS={"Doha Central":[25.2860,51.5340],"West Bay / Lusail":[25.4130,51.4880],"Industrial Area":[25.1630,51.5730],"Al Wakrah":[25.1660,51.6000],"Hamad Port":[24.9600,51.5570],"Al Rayyan":[25.2600,51.4240],"Mesaieed":[24.9880,51.5540]};
// Stable seeded positions: each vehicle gets a fixed lat/lng offset from its zone centre

  VEH.forEach((v,i)=>{

    v._lat=+(b[0]+(rng()-.5)*.10).toFixed(5);

/* Build deterministic tours — plan result PLUS already-active vehicles */
function buildTours(result){
  const START=7*60;

  // --- Newly optimised tours ---
  const byVeh={};
  (result||[]).forEach(a=>{
    if(!byVeh[a.vid])byVeh[a.vid]={vid:a.vid,drv:a.drv,zone:a.zone||"",orders:[]};
    byVeh[a.vid].orders.push(a);
  });
  const planTours=Object.values(byVeh).map((tour,i)=>{
    const v=VEH.find(x=>x.id===tour.vid);
    const color=TOUR_COLORS[i%TOUR_COLORS.length];
    let cursor=START+15+i*8;
    const blocks=[];
    tour.orders.forEach((a,j)=>{
      cursor+=18+j*5+i*3;
      const dwell=12+j*3+i*2;
      blocks.push({oid:a.oid,start:cursor,duration:dwell});
      cursor+=dwell;
    });
    const distKm=18+i*14+tour.orders.length*8;
    const totalWt=tour.orders.reduce((s,a)=>{const o=ORDERS.find(x=>x.id===a.oid);return s+(o?parseWt(o.wt):0);},0);
    return{tid:i+1,vid:tour.vid,drv:tour.drv,color,v,blocks,distKm,wt:totalWt.toFixed(1),source:"plan",zone:tour.zone||v?.zone||""};
  });

  // --- Already active / transit vehicles ---
  const activeTours=VEH.filter(v=>v.st==="transit"||v.st==="loading").map((v,i)=>{
    const ci=planTours.length+i;
    const color=TOUR_COLORS[ci%TOUR_COLORS.length];
    const nStops=4+i*2;
    const transitOrders=ORDERS.filter(o=>o.status==="transit");
    let cursor=START+25+i*14;
    const blocks=[];
    for(let j=0;j<nStops;j++){
      cursor+=16+j*5+i*3;
      const dwell=10+j*3;
      const ref=transitOrders[j%Math.max(1,transitOrders.length)];
      blocks.push({oid:ref?ref.id:`IN-${v.id}-${j+1}`,start:cursor,duration:dwell,active:true});
      cursor+=dwell;
    }
    const distKm=Math.round(v.util*0.9+22);
    const wt=(tonnage(v.type)*v.util/100).toFixed(1);
    return{tid:planTours.length+i+1,vid:v.id,drv:v.drv,color,v,blocks,distKm,wt,source:"active",zone:v.zone};
  });

  return[...planTours,...activeTours];
}

/* Single Gantt row */
/* P8 — per-tour capacity utilisation */
function tourUtil(tour){
  const cap=tonnage(tour.v?.type||"7t")||7;
  const loadWt=parseFloat(tour.wt)||0;
  const nStops=tour.blocks.length;
  const wPct=Math.min(99,Math.round(loadWt/cap*100));
  const vPct=Math.min(99,Math.max(6,Math.round(wPct*0.92)+(tour.tid%3)*3));
  const pPct=Math.min(99,Math.max(6,Math.round(wPct*0.88)+(nStops%4)*2));
  const remain=Math.max(0,cap-loadWt).toFixed(1);
  return{cap,loadWt,wPct,vPct,pPct,remain};
}
function ganttRow(tour,ti,START,SPAN){

          <span style="color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tour.drv}</span>
          ${overflowCount?`<span style="background:#eee;border-radius:9px;padding:0 5px;font-weight:700;color:var(--mut);flex:0 0 auto">+${overflowCount}</span>`:""}
        </div>
        <div style="font-size:10px;color:var(--mut);margin-top:1px">
          <span style="margin-inline-end:8px">&#x1F4CD; ${tour.distKm} km</span><span>&#x2696; ${tour.wt} t</span>
        </div>
        ${(()=>{const u=tourUtil(tour);const uc=u.wPct>90?"#e2473d":u.wPct>70?"#2f8a1f":"#f5a623";return`<div style="margin-top:3px">
          <div style="display:flex;gap:6px;font-size:9px;font-weight:700;color:var(--mut)">
            <span style="color:${uc}">W ${u.wPct}%</span><span>V ${u.vPct}%</span><span>P ${u.pPct}%</span><span style="margin-inline-start:auto;color:${u.remain>0?"var(--mut)":"#e2473d"}">${u.remain}t free</span>
          </div>
          <div style="height:4px;border-radius:2px;background:var(--line);margin-top:2px;overflow:hidden"><div style="height:100%;width:${u.wPct}%;background:${uc}"></div></div>
        </div>`})()}
      </div>
    </div>
    <div class="gtour-track">
      <div style="position:absolute;top:20px;left:${rLeft.toFixed(1)}%;width:${rWidth.toFixed(1)}%;height:6px;background:${tour.color};opacity:.22;border-radius:3px"></div>
      ${tour.blocks.map((b,bi)=>{
        const left=Math.max(0,Math.min(97,(b.start-START)/SPAN*100));
        const width=Math.max(2.2,b.duration/SPAN*100);
        return`<div class="gblock" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%;background:${tour.color}" title="${b.oid} · Stop ${bi+1}">${bi+1}</div>`;
      }).join("")}
    </div>
  </div>`;
}

/* Render Gantt — timeline left + Qatar map right */

          <span class="tag" style="background:#1a6b7c1a;color:#1a6b7c">Allocated: ${tours.reduce((s,t)=>s+t.blocks.filter(b=>!b.active).length,0)}</span>

function optimizeRoutes(){
  const idle=VEH.filter(v=>v.st==="idle");
  const unassigned=ORDERS.filter(o=>o.status==="unassigned")
    .sort((a,b)=>({High:0,Normal:1,Low:2}[a.pr]-{High:0,Normal:1,Low:2}[b.pr]));
  if(!idle.length){schToast("No idle vehicles available. Add trucks in Fleet & Resources.");return;}
  if(!unassigned.length){schToast("No unassigned orders to optimize.");return;}

  // Stop-count based packing: each vehicle gets 5–12 stops depending on zone/type
  const MAX_STOPS=12; // max deliveries per tour
  const MIN_STOPS=5;  // aim for at least 5 per truck
  const slots=idle.map(v=>({v,avail:tonnage(v.type)*(1-v.util/100)+8})); // loose capacity
  const assigned=new Set();
  const result=[];
  const pending=[...unassigned]; // work through in priority order

  for(const s of slots){
    if(assigned.size>=pending.length)break;
    let used=0,stops=0;
    for(const o of pending){
      if(assigned.has(o.id))continue;
      if(stops>=MAX_STOPS)break;
      const w=parseWt(o.wt);
      if(used+w<=s.avail){
        result.push({oid:o.id,vid:s.v.id,drv:s.v.drv,zone:s.v.zone});
        assigned.add(o.id);
        used+=w;
        stops++;
      }
    }
    // If truck has fewer than MIN_STOPS, grab lighter orders from remaining
    if(stops<MIN_STOPS){
      for(const o of pending){
        if(assigned.has(o.id))continue;
        if(stops>=MIN_STOPS)break;
        const w=parseWt(o.wt);
        if(w<=2){
          result.push({oid:o.id,vid:s.v.id,drv:s.v.drv,zone:s.v.zone});
          assigned.add(o.id);
          stops++;
        }
      }
    }
  }

  if(!result.length){schToast("No orders could be assigned. Add more trucks or unassigned orders.");return;}
  assigned.forEach(id=>{const o=ORDERS.find(x=>x.id===id);if(o)o.status="planned";});
  _planResult=result;_dispatched=false;_tourData=buildTours(result);_planTab="orders";
  _optimizerStats={orders:result.length,trucks:new Set(result.map(a=>a.vid)).size,profile:tp()?tp().name:'Balanced',totalKm:Math.round(result.length*18+slots.length*22),savedKm:Math.round(result.length*4.2)};
  render();
  // Flash the result banner
  setTimeout(function(){var el=document.getElementById('opt-result-banner');if(el){el.style.animation='none';void el.offsetWidth;el.style.animation='optIn .4s ease-out';}},50);
}
function autoDispatch(){
  if(!_planResult||!_planResult.length){schToast("Run Optimize first.");return;}
  const assignedOids=new Set(_planResult.map(a=>a.oid));
  const assignedVids=new Set(_planResult.map(a=>a.vid));
  ORDERS.forEach(o=>{if(assignedOids.has(o.id)){o.status="transit";o.eta=(10+Math.floor(Math.random()*5))+":"+(Math.floor(Math.random()*6)*10||"00");}});
  VEH.forEach(v=>{if(assignedVids.has(v.id)){v.st="transit";v.spd=(50+Math.floor(Math.random()*35))+" km/h";v.util=60+Math.floor(Math.random()*30);v.cap=v.util+"%";}});
  _dispatched=true;_planTab="timeline";render();
}

function seededRand(seed){return function(){seed=(seed*1664525+1013904223)>>>0;return seed/4294967295;};}
function idSeed(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}

const TILE_MAP_STATE={};
function llToWorld(lat,lng,z){const s=Math.sin(lat*Math.PI/180),scale=256*Math.pow(2,z);return{x:(lng+180)/360*scale,y:(0.5-Math.log((1+s)/(1-s))/(4*Math.PI))*scale};}
function worldToLL(x,y,z){const scale=256*Math.pow(2,z),lng=x/scale*360-180,n=Math.PI-2*Math.PI*y/scale,lat=180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)));return{lat,lng};}
function mapState(layerId){if(!TILE_MAP_STATE[layerId])TILE_MAP_STATE[layerId]={center:{lat:25.2854,lng:51.5310},zoom:9,bound:false,drag:null};return TILE_MAP_STATE[layerId];}
function bindTileMap(map,layerId){const st=mapState(layerId);if(st.bound)return;st.bound=true;
  map.addEventListener("wheel",e=>{e.preventDefault();mapZoom(layerId,e.deltaY<0?1:-1);},{passive:false});

  map.addEventListener("pointermove",e=>{if(!st.drag)return;const z=st.zoom,w=llToWorld(st.drag.c.lat,st.drag.c.lng,z);const ll=worldToLL(w.x-(e.clientX-st.drag.x),w.y-(e.clientY-st.drag.y),z);st.center=ll;renderTruckMarkers(layerId);});

function renderTiles(map,layerId){const st=mapState(layerId),pane=map.querySelector(".tile-pane");if(!pane)return;const r=map.getBoundingClientRect();if(r.width<20||r.height<20)return;const z=st.zoom,c=llToWorld(st.center.lat,st.center.lng,z),tl={x:c.x-r.width/2,y:c.y-r.height/2};const minX=Math.floor(tl.x/256)-1,maxX=Math.floor((tl.x+r.width)/256)+1,minY=Math.floor(tl.y/256)-1,maxY=Math.floor((tl.y+r.height)/256)+1,n=Math.pow(2,z);let html="";for(let x=minX;x<=maxX;x++){for(let y=minY;y<=maxY;y++){if(y<0||y>=n)continue;const xx=((x%n)+n)%n;html+=`<img class="map-tile" src="${TILE_URL.replace('{z}',z).replace('{x}',xx).replace('{y}',y)}" style="left:${Math.round(x*256-tl.x)}px;top:${Math.round(y*256-tl.y)}px" draggable="false">`;}}pane.innerHTML=html;return{z,tl,w:r.width,h:r.height};}
function renderTruckMarkers(layerId,compact=false){

function schWizCheck(){

function schAct(bk,status){var b=BOOKINGS.find(function(x){return x.bk===bk;});if(!b)return;if(status==='confirmed'&&(b.status==='noshow'||b.status==='delayed')){b.start=Math.min(schF().close-b.dur,b.start+120);b.delay=0;}b.status=status;if(status==='checkedin'&&!b.cin)b.cin=schFmt(new Date().getHours()*60+new Date().getMinutes());if(status==='completed'&&!b.cout)b.cout=schFmt(b.start+b.dur);schOpenBooking(bk);render();var msg={confirmed:'Approved \u2014 delivery window locked',rejected:'Booking rejected',notified:'Driver notified with slot details',checkedin:'Checked in at gate',loading:'Sent to dock',completed:'Appointment completed'}[status]||'Updated';schToast(msg,status==='rejected'?'#e2473d':'#3FAE2A');}

function dispatchResolveBody(oid){var r=_dispatchRowMap[oid];if(!r)return '<div style="padding:20px">No readiness data \u2014 reopen Dispatch.</div>';var failed=r.checks.filter(function(c){return !c[1]});var col=r.pct>=80?'#2f8a1f':(r.pct>=60?'#f5a623':'#e2473d');var head='<div class="dh"><div><div style="font-size:11px;color:var(--mut);letter-spacing:.08em;font-weight:800">RESOLVE BLOCKED TRIP</div><h3 style="margin:3px 0 0">'+oid+' \u00b7 '+r.cust+'</h3></div><button class="x" onclick="closeDrawer()">\u00d7</button></div>';var meta='<div style="display:flex;gap:18px;padding:14px 20px;border-bottom:1px solid var(--line);font-size:12px"><div><div style="color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.05em">Vehicle</div><b>'+(r.vid||'\u2014')+'</b></div><div><div style="color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.05em">Driver</div><b>'+(r.drv||'Unassigned')+'</b></div><div><div style="color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.05em">Readiness</div><b style="color:'+col+'">'+r.pct+'%</b></div></div>';var blockHdr='<div style="padding:14px 20px 6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)">'+(failed.length?failed.length+' item'+(failed.length>1?'s':'')+' blocking release':'All checks passed')+'</div>';var list='<div style="padding:0 20px">'+r.checks.map(function(c){var f=DISPATCH_FIX[c[0]]||{label:c[0],miss:c[0],act:'Fix',detail:''};if(c[1])return '<div class="trigger-row"><span style="color:#2f8a1f"><b>\u2713 '+f.label+'</b></span><span class="tag" style="background:#3fae2a1a;color:#2f8a1f">Done</span></div>';return '<div class="trigger-row"><span><b style="color:#e2473d">! '+f.miss+'</b><div style="font-size:11px;color:var(--mut);margin-top:2px;max-width:340px">'+f.detail+'</div></span><button class="btn p" style="font-size:11px;align-self:center;white-space:nowrap" onclick="dispatchFixRoute(\''+oid+'\',\''+c[0]+'\')">'+f.act+'</button></div>';}).join('')+'</div>';var foot='<div style="padding:16px 20px">'+(failed.length?'<button class="btn g" style="width:100%" onclick="dispatchFixAll(\''+oid+'\')">Resolve all & make ready</button>':'<button class="btn p" style="width:100%" onclick="dispatchReleaseOne(\''+oid+'\')">Release trip to driver \u2192</button>')+'</div>';return head+meta+blockHdr+list+foot;}

  {id:"container",icon:"🚢",label:"Container",svc:"container"},
  {id:"pallets",icon:"📦",label:"Pallets",svc:"dist"},
  {id:"boxes",icon:"📫",label:"Boxes / Cartons",svc:"dist"},
  {id:"equipment",icon:"⚙️",label:"Equipment",svc:"project"},
  {id:"vehicles",icon:"🚗",label:"Vehicles",svc:"p2p"},
  {id:"general",icon:"📋",label:"General Cargo",svc:"p2p"},
  {id:"temp",icon:"❄️",label:"Temperature Controlled",svc:"reefer"}
];
function wizPickFriendly(cid){
  const f=FRIENDLY_CARGO.find(x=>x.id===cid);
  if(!f)return;
  _wiz.friendlyCargo=cid; _wiz.svc=f.svc;
  renderWiz();
}

/* P9 — apply a template: pre-fill service, vehicle, package, activities, temperature, then jump into the flow */
function wizApplyTemplate(id){
  const tpl=ORDER_TEMPLATES.find(t=>t.id===id);
  if(!tpl)return;
  _wiz.svc=tpl.svc;
  _wiz.equip=tpl.vehicle||null;
  _wiz.friendlyCargo=null;
  if(tpl.pkg)_wiz.rentalPackage=tpl.pkg;
  if(tpl.duration)_wiz.rentalDuration=tpl.duration;
  if(tpl.temp)_wiz.temperature=tpl.temp;
  if(tpl.acts&&tpl.acts.length)_wiz.deliveryActs=[...tpl.acts];
  _wiz.appliedTemplate=tpl.name;
  _wiz.phase="flow"; _wiz.flowStep=0;
  renderWiz();
}
function wizStartFlow(){if(!_wiz.svc)return;_wiz.phase="flow";_wiz.flowStep=0;renderWiz();}
function wizFlowNext(){const steps=SVC_FLOWS[_wiz.svc]?.steps||[];if(_wiz.flowStep<steps.length-1){_wiz.flowStep++;renderWiz();}}
function wizFlowBack(){if(_wiz.flowStep>0){_wiz.flowStep--;renderWiz();}else{_wiz.phase="service";renderWiz();}}
function _wfProgBar(steps){
  return steps.map((s,i)=>{
    const done=i<_wiz.flowStep,active=i===_wiz.flowStep,cls=done?"done":active?"active":"todo";
    return`<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
      <div class="wdot ${cls}">${done?"✓":i+1}</div>
      <span class="wlbl ${active?"active":""}" style="font-size:10.5px">${s.label}</span>
    </div>${i<steps.length-1?`<div class="wconn ${done?"done":"todo"}"></div>`:""}`
  }).join("");
}
function _wizStepContent(id){
  return({customer:wfCustomer,vehicle:wfVehicle,package:wfPackage,duration:wfDuration,fleet_config:wfFleetConfig,locations:wfLocations,container_type:wfContainerType,handling:wfHandling,reefer_config:wfReeferConfig,cargo:wfCargo,activities:wfActivities,timewindows:wfTimeWindows,equipment:wfEquipment,permits:wfPermits,special:wfSpecial,customs:wfCustoms,review:wfReview}[id]||function(){return"";})();
}

function wfReview(){
  const svc=WIZ_SVC.find(s=>s.id===_wiz.svc);
  const rows=[];
  if(svc) rows.push(["Service",svc.icon+" "+svc.label]);
  if(_wiz.appliedTemplate) rows.push(["From Template",_wiz.appliedTemplate]);
  if(_wiz.customer) rows.push(["Customer",_wiz.customer]);
  if(_wiz.orderRef) rows.push(["Reference",_wiz.orderRef]);
  rows.push(["Priority",_wiz.priority],["Payment",_wiz.payment]);
  if(_wiz.pickup.addr) rows.push(["Pickup",_wiz.pickup.addr+((_wiz.pickup.timeFrom&&_wiz.pickup.timeTo)?" ("+_wiz.pickup.timeFrom+"–"+_wiz.pickup.timeTo+")":"")]);
  if(_wiz.delivery[0]?.addr) rows.push(["Delivery",_wiz.delivery[0].addr]);
  if(_wiz.delivery.length>1) rows.push(["Stops",_wiz.delivery.length+" stops"]);
  if(_wiz.equip) rows.push(["Vehicle",_wiz.equipQty+"× "+_wiz.equip]);
  if(_wiz.containerType) rows.push(["Container",_wiz.equipQty+"× "+_wiz.containerType+" ("+_wiz.containerStatus+")"]);
  if(_wiz.handlingMethod&&_wiz.svc==="container") rows.push(["Handling",_wiz.handlingMethod+(_wiz.groundPlacement?" · Ground placement":"")]);
  if(_wiz.reeferUnit) rows.push(["Reefer",_wiz.reeferUnit]);
  if(_wiz.temperature&&_wiz.temperature!=="Ambient") rows.push(["Temperature",_wiz.temperature]);
  if(_wiz.category) rows.push(["Category",WIZ_CATS.find(c=>c.id===_wiz.category)?.label||_wiz.category]);
  if(_wiz.weight) rows.push(["Weight",_wiz.weight+" t"]);
  if(_wiz.qty) rows.push(["Quantity",_wiz.qty+" "+_wiz.uom]);
  if(_wiz.rentalPackage){const pk=PKG_DEFS.find(p=>p.id===_wiz.rentalPackage);rows.push(["Package",pk?pk.label:_wiz.rentalPackage]);}
  if(_wiz.rentalDuration&&(_wiz.svc==="vrent"||_wiz.svc==="fleet")) rows.push(["Duration",_wiz.rentalDuration+" × "+_wiz.rentalDurationVal+(_wiz.rentalStart?" from "+_wiz.rentalStart:"")]);
  if(_wiz.svc==="fleet") rows.push(["Fleet",_wiz.fleetVehicles.map(v=>v.qty+"× "+v.type).join(", ")]);
  if(_wiz.pickupActs.length) rows.push(["Pickup Svcs",_wiz.pickupActs.join(", ")]);
  if(_wiz.deliveryActs.length) rows.push(["Delivery Svcs",_wiz.deliveryActs.join(", ")]);
  if(_wiz.labour.length) rows.push(["Labour",_wiz.labour.join(", ")]);
  if(_wiz.siteMHE.length) rows.push(["Site MHE",_wiz.siteMHE.join(", ")]);
  if(_wiz.customsBroker) rows.push(["Customs",_wiz.customsBroker]);
  if(_wiz.worksite&&_wiz.svc==="oilgas") rows.push(["Worksite",_wiz.worksite+" / "+_wiz.hseLevel]);
  if(_wiz.recurring) rows.push(["Recurring",_wiz.recurring]);
  const half=Math.ceil(rows.length/2);

  /* P5 — transparent pricing */
  const isRental=_wiz.svc==="vrent"||_wiz.svc==="fleet";
  const inc=pkgInc(_wiz.rentalPackage);
  const prof=custProfile(_wiz.customer);
  const hasContract=prof&&prof.contract&&prof.contract!=="—";
  const contractName=hasContract?prof.contract:"Standard Tariff 2026 (no contract)";
  const rateTable=isRental?"Dedicated Rental Rate Card":_wiz.svc==="container"?"Container Movement Tariff":"Distribution / Transport Tariff";
  const money=n=>"QAR "+Math.round(n).toLocaleString();
  const lines=[];
  if(isRental){
    const months=_wiz.rentalDuration==="Daily"?((+_wiz.rentalDurationVal||1)/30):_wiz.rentalDuration==="Weekly"?((+_wiz.rentalDurationVal||1)/4):(+_wiz.rentalDurationVal||1);
    const vehCount=_wiz.svc==="fleet"?_wiz.fleetVehicles.reduce((s,f)=>s+f.qty,0):(_wiz.equipQty||1);
    lines.push(["Vehicle Rental",8000*vehCount*months,vehCount+" veh × QAR 8,000/mo"]);
    if(inc.driver) lines.push(["Driver",4500*vehCount*months,"Standard driver"]);
    if(inc.fuel) lines.push(["Fuel",2000*vehCount*months,"Up to 5,000 km/mo"]);
    if(inc.maint) lines.push(["Maintenance",1200*vehCount*months,"Full maintenance"]);
  } else {
    const base=(parseFloat(_wiz.weight)||2)*35+420;
    lines.push(["Vehicle Rate",base,(_wiz.equip||"Standard vehicle")]);
    if(_wiz.delivery.length>1) lines.push(["Multi-stop",( _wiz.delivery.length-1)*60,(_wiz.delivery.length-1)+" extra stops"]);
    if(_wiz.waitTime>60) lines.push(["Waiting Charges",(_wiz.waitTime-60)/60*45,"Beyond 60 min free"]);
    if(_wiz.labour.length) lines.push(["Labour Charges",_wiz.labour.length*80,_wiz.labour.length+" × QAR 80/hr"]);
    const addl=_wiz.pickupActs.length+_wiz.deliveryActs.length;
    if(addl) lines.push(["Additional Services",addl*40,addl+" activities"]);
    if(_wiz.temperature&&_wiz.temperature!=="Ambient") lines.push(["Cold Chain Surcharge",180,_wiz.temperature]);
    if(_wiz.groundPlacement) lines.push(["Side Loader / Ground",220,"Ground placement"]);
  }
  const total=lines.reduce((s,l)=>s+l[1],0);
  _wiz._estTotal=total;

  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:14px">

  </div>

    </div>
    <div style="padding:8px 14px;background:#e8f4f7;font-size:11px;color:#1a7896;display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid #1a789630">
      <span>📄 Contract: <b>${contractName}</b></span><span>📊 Rate Table: <b>${rateTable}</b></span>
    </div>
    <div style="padding:6px 14px;background:var(--card)">
      ${lines.map(([l,v,d])=>`<div style="display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px">
        <span>${l}${d?` <span style="font-size:10px;color:var(--mut)">· ${d}</span>`:""}</span><b style="color:#1a7896">${money(v)}</b>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0 4px">
        <span style="font-size:13px;font-weight:800;color:var(--ink)">Total Estimate${isRental?" / period":""}</span>
        <span style="font-size:20px;font-weight:800;color:#2f8a1f">${money(total)}</span>
      </div>
    </div>
    <div style="padding:8px 14px;background:#fafbfb;border-top:1px solid var(--line);font-size:10.5px;color:var(--mut)">${hasContract?"Rates applied from active customer contract.":"No customer contract — standard tariff applied. Contract rates will override on submission."}</div>
  </div>`;
}

function vDriverApp(){const jobs=VEH.filter(v=>v.st==="transit"||v.st==="loading").slice(0,5);const flow=[["ACPT","Accept job","Driver acknowledges the order brief, customer notes, ETA target and load constraints.","done",["Order brief","SLA target"]],["TRIP","Start trip","GPS execution starts, odometer is logged and the trip moves to active execution.","done",["GPS on","Vehicle check"]],["PICK","Arrive pickup","Site arrival is geotagged, dock / gate reference confirmed and waiting time starts.","done",["Gate check","Dock ref"]],["LOAD","Loading complete","Loaded quantities, seal number and any pickup exceptions are captured.","done",["Seal no.","Qty confirmed"]],["NAV","Navigate to delivery","Driver follows the planned route with live ETA monitoring and deviation checks.","now",["ETA live","Route guidance"]],["POD","Capture POD","Receiver name, signature, photos and delivery remarks are captured in-app.","pending",["Signature","Photos"]],["ISS","Report issue","Any delay, short shipment, refusal or incident is raised back to dispatch.","pending",["Exception","Escalation"]],["DONE","Complete trip","Actual timings, proof documents and charge triggers flow back to TMS and billing.","pending",["Actuals","Billing trigger"]]];return `<div class="grid" style="grid-template-columns:330px 1fr;gap:16px"><div class="card" style="overflow:hidden"><div style="background:#0e2730;color:#fff;padding:14px 16px"><b>Driver App</b><div style="font-size:11px;color:#bcd0d6">Today’s jobs</div></div><div class="pad">${jobs.map((v,i)=>`<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:${i===0?'#f0faf4':'#fff'}"><div class="mob-job-row">${ebg(i===0?'TRIP':'TRK',i===0?'eb-green':'eb-blue',false)}<div style="flex:1;min-width:0"><div class="between" style="align-items:flex-start"><b>${v.id}</b><span class="tag">${i+2} stops</span></div><div style="font-size:12px;color:var(--mut);margin:5px 0">${v.drv} · ${(v._mapArea||v.zone)}</div><div class /* ===================== v29 route optimization engine ===================== */
var ROUTE_OPT_SETTINGS={distance:25,traffic:20,timeWindow:80,capacity:90,driverHours:75,serviceTime:65,cost:45,maxStops:12,minStops:5,reoptWindow:20};
var _routeOptAudit=null;
function roPriorityScore(p){return p==='High'?100:p==='Normal'?62:35;}
function roZoneDist(a,b){var ca=ZONE_COORDS[a]||[25.2854,51.5310],cb=ZONE_COORDS[b]||[25.2854,51.5310];var dx=(ca[0]-cb[0])*111,dy=(ca[1]-cb[1])*101;return Math.round(Math.sqrt(dx*dx+dy*dy));}
function roOrderMinutes(o){var base=28+roZoneDist(o.from,o.to)*1.8;var svc=18+(o.stops||1)*8+(parseWt(o.wt)>5?12:0);var pr=o.pr==='High'?-8:o.pr==='Low'?10:0;return Math.max(35,Math.round(base+svc+pr));}
function roVehicleCost(v){var t=tonnage(v.type);return Math.round(160+t*18+(v.type.includes('Reefer')?140:0)+(v.type.includes('Flatbed')?80:0));}
function roScoreRoute(slot,o){var w=parseWt(o.wt);var capPenalty=Math.max(0,(slot.used+w)-slot.avail)*80;var utilAfter=(slot.used+w)/Math.max(1,slot.avail);var utilPenalty=utilAfter>1?100:Math.abs(.82-utilAfter)*35;var zonePenalty=roZoneDist(slot.zone,o.from)*ROUTE_OPT_SETTINGS.distance/25;var timePenalty=(o.pr==='High'?0:8)*(ROUTE_OPT_SETTINGS.timeWindow/80);var costPenalty=roVehicleCost(slot.v)/100;return capPenalty+utilPenalty+zonePenalty+timePenalty+costPenalty-roPriorityScore(o.pr)/8;}
function roWhyAssigned(v,o,score){var reasons=[];if((v.zone||'')===o.from)reasons.push('same origin zone');if(tonnage(v.type)>=parseWt(o.wt))reasons.push('capacity fit');if(o.pr==='High')reasons.push('high priority');if(v.type.includes('Reefer')||/Food|Pharma|Frozen/i.test(o.cust||''))reasons.push('cold-chain capable');if(!reasons.length)reasons.push('lowest composite score');return reasons.join(', ')+'; score '+Math.round(score);}
function roBuildSummary(result){var by={};result.forEach(function(a){if(!by[a.vid])by[a.vid]={vid:a.vid,drv:a.drv,zone:a.zone,orders:[],wt:0,mins:0,cost:0,score:0};var o=ORDERS.find(function(x){return x.id===a.oid});if(o){by[a.vid].orders.push(o);by[a.vid].wt+=parseWt(o.wt);by[a.vid].mins+=roOrderMinutes(o);}by[a.vid].score+=a.score||0;});return Object.values(by).map(function(r){var v=VEH.find(function(x){return x.id===r.vid})||{};var cap=tonnage(v.type||'7t');r.vehicle=v;r.cap=cap;r.util=Math.min(99,Math.round(r.wt/cap*100));r.cost=r.orders.length*roVehicleCost(v)+Math.round(r.mins*2.2);r.risk=(r.util>92?24:0)+(r.orders.some(function(o){return o.pr==='High'})?0:8)+(r.mins>480?30:0);r.quality=Math.max(35,Math.min(98,100-Math.round(r.score/Math.max(1,r.orders.length))-Math.round(r.risk/3)));return r;}).sort(function(a,b){return b.orders.length-a.orders.length});}
function roSet(k,v){ROUTE_OPT_SETTINGS[k]=Number(v);var el=document.getElementById('ro_'+k);if(el)el.textContent=v+(k==='reoptWindow'?' min':'%');}

    {icon:'9',phase:'Costs',name:'Adding commercial and SLA penalties',desc:'Adds profile weights for cost, lateness, waiting time, overtime, third-party use, capacity reserve, customer priority and service duration.',stat:'score model'},
    {icon:'10',phase:'Construct',name:'Constructing initial route plan',desc:'Creates a first feasible solution using savings/regret-style insertion: assign compatible orders into trucks before deep improvement.',stat:'initial routes'},
    {icon:'11',phase:'Construct',name:'Consolidating and clustering loads',desc:'Groups compatible orders by geography, time-window overlap, load type and vehicle capacity. Split orders are '+(allowSplit?'allowed where profile permits':'blocked for this profile')+'.',stat:'clusters'},
    {icon:'12',phase:'Improve',name:'Sequencing stops inside each route',desc:'Orders the stops with pickup-delivery precedence, service time, travel time, driver breaks and the '+p.shift+' hour shift limit.',stat:'route order'},

    {icon:'15',phase:'Review',name:'Scoring scenarios and exceptions',desc:'Ranks routes by quality, cost, utilization, SLA risk and driver-hour risk; prepares an exception queue with recommended fixes.',stat:p.objective},
    {icon:'16',phase:'Publish',name:'Publishing plan and re-optimization hooks',desc:'Creates route tours, map/timeline output, dispatch readiness, mobile job packets and rolling '+reopt+' re-optimization triggers.',stat:'result set'}
  ];
}
function cancelOptimizerRun(){
  if(_optimizerRunTimer){clearTimeout(_optimizerRunTimer);_optimizerRunTimer=null;}
  _optimizerRunState=null;
  closeModal();
}

    return '<div class="ro-run-step '+cls+'" id="roRunStep_'+idx+'"><div class="ro-run-ico">'+step.icon+'</div><div><span class="ro-run-phase">'+step.phase+'</span><div class="ro-run-name">'+step.name+'</div><div class="ro-run-desc">'+step.desc+'</div></div><span class="ro-run-stat">'+label+' - '+step.stat+'</span></div>';

  var footer=s.status==='ready'
    ? '<button class="btn g" onclick="cancelOptimizerRun()">Cancel</button><button class="btn p" onclick="startOptimizerRun()">Run Optimizer</button>'
    : (s.status==='running'

      : '<button class="btn g" onclick="closeModal()">Stay Here</button><button class="btn p" onclick="closeModal();setPlanTab(\'orders\')">View Results</button>');
  var summary=s.status==='done'&&_routeOptAudit
    ? '<div class="ro-ok" style="margin-bottom:12px"><b>Optimization complete.</b> '+_routeOptAudit.orders+' orders assigned to '+_routeOptAudit.trucks+' trucks using '+_routeOptAudit.profile+' under '+_routeOptAudit.wave+'.</div>'
    : '<div class="note" style="margin-bottom:12px">A real TMS optimizer first builds a feasible VRP model, then constructs and improves routes. Map services provide travel costs and navigation, not the full 50-stop sequencing decision.</div>';
  var methods='<div class="ro-run-method"><span>Wave selection</span><span>Compatibility matrix</span><span>Time-dependent cost matrix</span><span>Savings/regret insertion</span><span>Local search / LNS repair</span><span>Rolling re-optimization</span></div>';
  var shell=document.getElementById('optimizerRunShell');
  if(!shell){
    showModal('<div class="modal" id="optimizerRunShell" style="max-width:940px" onclick="event.stopPropagation()"><div class="modal-h"><div><h3>Run Optimizer</h3><div id="optimizerRunSub" style="font-size:11px;color:var(--mut);margin-top:4px">'+w.name+' - '+p.name+' - '+counts.orders+' unassigned orders - '+counts.trucks+' available trucks</div></div><button class="x" onclick="cancelOptimizerRun()">x</button></div><div class="modal-b" id="optimizerRunBody" style="max-height:72vh;overflow:auto;scroll-behavior:smooth">'+summary+methods+'<div class="pi-profile-tiles" style="margin-bottom:14px"><div class="pi-profile-tile"><b>Planning wave</b><div>'+w.name+'</div><div class="pi-mini-note" style="margin-top:4px">'+waveCriteriaSummary(w)+'</div></div><div class="pi-profile-tile"><b>Transport profile</b><div>'+p.name+' - '+p.objective+'</div><div class="pi-mini-note" style="margin-top:4px">Shift '+p.shift+'h, split '+p.split+', re-opt '+p.reopt+', spare capacity '+p.spare+'%.</div></div></div><div class="ro-run-grid">'+rows+'</div></div><div class="modal-foot" id="optimizerRunFoot">'+footer+'</div></div>');
    shell=document.getElementById('optimizerRunShell');
  }else{
    var sub=document.getElementById('optimizerRunSub');
    if(sub)sub.textContent=w.name+' - '+p.name+' - '+counts.orders+' unassigned orders - '+counts.trucks+' available trucks';
    var body=document.getElementById('optimizerRunBody');
    if(body){
      var keep=body.scrollTop;
      body.innerHTML=summary+methods+'<div class="pi-profile-tiles" style="margin-bottom:14px"><div class="pi-profile-tile"><b>Planning wave</b><div>'+w.name+'</div><div class="pi-mini-note" style="margin-top:4px">'+waveCriteriaSummary(w)+'</div></div><div class="pi-profile-tile"><b>Transport profile</b><div>'+p.name+' - '+p.objective+'</div><div class="pi-mini-note" style="margin-top:4px">Shift '+p.shift+'h, split '+p.split+', re-opt '+p.reopt+', spare capacity '+p.spare+'%.</div></div></div><div class="ro-run-grid">'+rows+'</div>';
      body.scrollTop=keep;
    }
    var foot=document.getElementById('optimizerRunFoot');
    if(foot)foot.innerHTML=footer;
  }
  requestAnimationFrame(function(){
    var body=document.getElementById('optimizerRunBody');
    if(!body)return;
    body.scrollTop=prevScroll||body.scrollTop;
    if(s.status==='running'){scrollOptimizerRunStep(s.index);}
  });
}
function scrollOptimizerRunStep(idx){
  var body=document.getElementById('optimizerRunBody'),el=document.getElementById('roRunStep_'+idx);
  if(!body||!el)return;
  var br=body.getBoundingClientRect(),er=el.getBoundingClientRect();
  var bottomPad=24,topPad=12;
  if(er.bottom>br.bottom-bottomPad){
    body.scrollTo({top:body.scrollTop+(er.bottom-(br.bottom-bottomPad)),behavior:'smooth'});
  }else if(er.top<br.top+topPad){
    body.scrollTo({top:Math.max(0,body.scrollTop-(br.top+topPad-er.top)),behavior:'smooth'});
  }
  _optimizerRunScrollTop=body.scrollTop;
}
function openOptimizerRunDialog(){
  var idle=VEH.filter(function(v){return v.st==='idle';});
  var pending=ORDERS.filter(function(o){return o.status==='unassigned';});
  if(!idle.length){schToast('No idle vehicles available. Add trucks in Fleet & Resources.');return;}
  if(!pending.length){schToast('No unassigned orders to optimize.');return;}
  _optimizerRunScrollTop=0;
  _optimizerRunState={status:'ready',index:0,steps:roRunSteps()};
  renderOptimizerRunDialog();
}
function startOptimizerRun(){
  if(!_optimizerRunState)return;
  _optimizerRunState.status='running';
  _optimizerRunState.index=0;
  _optimizerRunScrollTop=0;
  renderOptimizerRunDialog();
  function nextStep(){
    if(!_optimizerRunState||_optimizerRunState.status!=='running')return;
    if(_optimizerRunState.index<_optimizerRunState.steps.length-1){
      _optimizerRunState.index+=1;
      renderOptimizerRunDialog();
      _optimizerRunTimer=setTimeout(nextStep,1150);
      return;
    }
    _optimizerRunTimer=null;
    executeOptimizeRoutes();
    if(!_optimizerRunState)return;
    _optimizerRunState.status='done';
    _optimizerRunState.index=_optimizerRunState.steps.length-1;
    renderOptimizerRunDialog();
  }
  _optimizerRunTimer=setTimeout(nextStep,1150);
}

 crossborder:[['accept'],['inspect'],['start'],['arr_pickup'],['loading',1,1],['customs',1,1],['arr_delivery'],['unloading'],['pod',1,1],['exception',0],['complete']],

function efBuild(def){return def.map(d=>({ref:d[0],uid:d[0]+'_'+(_efUid++),mandatory:d[1]!==0,photo:!!d[2]}));}
const EF_FLOWS={};Object.keys(EF_DEFAULTS).forEach(k=>{EF_FLOWS[k]=efBuild(EF_DEFAULTS[k]);});

function efTypeBadge(id){return {dist:['DI','eb-green'],container:['CT','eb-cyan'],crossborder:['CB','eb-blue'],reefer:['RF','eb-cyan'],p2p:['P2','eb-amber'],vrent:['VR','eb-teal']}[id]||['SV','eb-teal'];}

function efToggle(uid,key){const e=efFlow().find(x=>x.uid===uid);if(!e)return;e[key]=!e[key];_efDirty[_efType]=true;render();}

function efDrop(e,uid){e.preventDefault();if(!_efDrag||_efDrag===uid){_efDrag=null;render();return;}const a=efFlow(),from=efIdx(_efDrag),to=efIdx(uid);if(from<0||to<0){_efDrag=null;render();return;}const x=a.splice(from,1)[0];a.splice(to,0,x);_efDirty[_efType]=true;_efDrag=null;render();}
function efDragEnd(){_efDrag=null;document.querySelectorAll('.ef-event.drop').forEach(r=>r.classList.remove('drop'));}
function efAddOpen(){const cards=EF_LIB.map(l=>`<div class="ef-libcard" onclick="efAdd('${l.id}')"><div class="ef-ic" style="flex:0 0 30px">${l.icon}</div><div style="flex:1;min-width:0"><div class="ef-title" style="font-size:13px">${l.name}<span class="ef-cat">${l.cat}</span></div><div class="ef-desc">${l.desc}</div></div><div class="ef-libadd">+ Add</div></div>`).join('');const ty=EF_TYPES.find(x=>x.id===_efType)||{};showModal(`<div class="modal" style="max-width:620px" onclick="event.stopPropagation()"><div class="modal-h"><h3>Add Event \u00b7 ${ty.name} Flow</h3><button class="x" onclick="closeModal()">\u00d7</button></div><div class="modal-b" style="max-height:70vh;overflow:auto"><div style="font-size:12px;color:var(--mut);margin-bottom:11px">Pick an event from the catalogue. It is appended to the end of the flow \u2014 reorder it afterwards.</div><div class="ef-libgrid">${cards}</div></div></div>`);}
function efAdd(ref){efFlow().push({ref:ref,uid:ref+'_'+(_efUid++),mandatory:true,photo:false});_efDirty[_efType]=true;closeModal();render();}
function efReset(){const ty=EF_TYPES.find(x=>x.id===_efType)||{};showModal(`<div class="modal sm" onclick="event.stopPropagation()"><div class="modal-h"><h3>Reset ${ty.name} flow?</h3><button class="x" onclick="closeModal()">\u00d7</button></div><div class="modal-b"><p style="margin:0 0 14px;color:var(--mut);line-height:1.5">This restores the default GWC event sequence for <b>${ty.name}</b>. Any unpublished edits will be lost.</p><div class="flex" style="justify-content:flex-end;gap:8px"><button class="btn g" onclick="closeModal()">Cancel</button><button class="btn p" onclick="efDoReset()">Reset flow</button></div></div></div>`);}
function efDoReset(){EF_FLOWS[_efType]=efBuild(EF_DEFAULTS[_efType]);_efDirty[_efType]=true;closeModal();render();}
function efPublish(){if(!_efDirty[_efType])return;const ty=EF_TYPES.find(x=>x.id===_efType)||{};const v=(_efVersion[_efType]||'1.0').split('.');_efVersion[_efType]=v[0]+'.'+((+v[1]||0)+1);_efDirty[_efType]=false;const f=efFlow();showModal(`<div class="modal sm" onclick="event.stopPropagation()"><div class="modal-h"><h3>\u2713 Flow published</h3><button class="x" onclick="closeModal()">\u00d7</button></div><div class="modal-b"><p style="margin:0 0 8px"><b>${ty.name}</b> event flow <b>v${_efVersion[_efType]}</b> is now live in the Driver App.</p><div style="font-size:12px;color:var(--mut);line-height:1.65">${f.length} events \u00b7 ${f.filter(e=>e.mandatory).length} required \u00b7 ${f.filter(e=>e.photo).length} with photo proof.<br>Drivers starting new ${ty.name} jobs will see the updated sequence. Trips already in progress keep the flow they started on.</div><div class="flex" style="justify-content:flex-end;margin-top:14px"><button class="btn p" onclick="closeModal()">Done</button></div></div></div>`);render();}
function vMobileFlows(){
  const type=EF_TYPES.find(t=>t.id===_efType)||EF_TYPES[0];
  const flow=efFlow();const dirty=_efDirty[_efType];
  const bar=EF_TYPES.map(t=>{const f=EF_FLOWS[t.id],mand=f.filter(e=>e.mandatory).length,badge=efTypeBadge(t.id);return `<div class="ef-type ${t.id===_efType?'on':''}" onclick="efSelectType('${t.id}')" style="${t.id===_efType?'border-color:'+t.color:''}">

    return `<div class="ef-event" draggable="true" data-uid="${e.uid}" ondragstart="efDragStart('${e.uid}')" ondragend="efDragEnd()" ondragover="efDragOver(event)" ondrop="efDrop(event,'${e.uid}')">

        <button class="ef-del" onclick="efRemove('${e.uid}')" title="Remove step">\u2715</button>
      </div>
    </div>`;}).join('');
  let _pc=[],_inCyc=false;

  });
  if(_inCyc)_pc.push('</div>');
  const preview=_pc.join('');

  <div class="ef-typebar">${bar}</div>
  ${_efType==='vrent'?`<div class="ef-bill"><span style="font-size:18px">\u26fd</span><div><b>Rental billing link</b> \u2014 <b>Daily Login / Logout</b> bracket each booked day for utilisation, and <b>Add Fuel Charge</b> plus excess-km from <b>Vehicle Return</b> post straight to the Billing workbench.</div></div>`:''}
  <div class="ef-shell">

    </div>

 {id:'brake',name:'Brake Inspection & Pads',cat:'Safety',dur:1,icon:'\ud83d\uded1'},
 {id:'tyre',name:'Tyre Replacement',cat:'Preventive',dur:1,icon:'\ud83d\udede'},
 {id:'reefer',name:'Reefer / AC Service',cat:'Cold Chain',dur:2,icon:'\u2744\ufe0f'},
 {id:'annual',name:'Annual Inspection (Istimara)',cat:'Compliance',dur:1,icon:'\ud83d\udccb'},
 {id:'engine',name:'Engine Diagnostics & Repair',cat:'Corrective',dur:3,icon:'\u2699\ufe0f'},
 {id:'body',name:'Bodywork & Paint',cat:'Corrective',dur:4,icon:'\ud83d\udd28'},
 {id:'electrical',name:'Electrical / Battery',cat:'Corrective',dur:1,icon:'\ud83d\udd0b'},
 {id:'suspension',name:'Suspension & Steering',cat:'Preventive',dur:2,icon:'\ud83d\udd27'}
];
const PM_BAYS=['Bay 1','Bay 2','Bay 3','Bay 4','External Vendor'];
const PM_TECHS=['Yousef H.','Ramesh P.','Abdul K.','Mahmoud S.'];
const PM_PRIOS=['High','Normal','Low'];
function pmJob(id){return PM_JOBS.find(j=>j.id===id)||{name:id,cat:'',icon:'\ud83d\udd27'};}
function pmVeh(id){return VEH.find(v=>v.id===id);}
let _pmSeq=118;
function pmNewId(){return 'PM-2406-'+(++_pmSeq);}
let PM_ORDERS=[
 {id:'PM-2406-101',veh:'GWC-2950',job:'brake',from:pmISO(-1),to:pmISO(1),bay:'Bay 3',tech:'Yousef H.',priority:'High',status:'in_progress',notes:'Brake judder reported on post-trip checklist.',cost:0},
 {id:'PM-2406-105',veh:'GWC-3088',job:'annual',from:pmISO(2),to:pmISO(2),bay:'Bay 1',tech:'Abdul K.',priority:'High',status:'scheduled',notes:'Istimara renewal + safety inspection.',cost:0},
 {id:'PM-2406-109',veh:'GWC-4006',job:'reefer',from:pmISO(4),to:pmISO(5),bay:'Bay 2',tech:'Ramesh P.',priority:'Normal',status:'scheduled',notes:'Annual reefer unit service, gas top-up.',cost:0}
];
function pmActive(o){return o.status==='scheduled'||o.status==='in_progress';}
function pmOverdue(o){return o.status==='in_progress'&&pmDayOffset(o.to)<0;}
function pmRecompute(){
 VEH.forEach(v=>{if(v._pmManaged){v.st=v._pmPrev;v._pmManaged=false;delete v._pmPrev;}});
 PM_ORDERS.forEach(o=>{ if(o.status==='in_progress'||(o.status==='scheduled'&&pmDayOffset(o.from)<=0&&pmDayOffset(o.to)>=0)){ var v=pmVeh(o.veh); if(v&&!v._pmManaged){v._pmPrev=(v.st==='maint'?'idle':v.st);v._pmManaged=true;v.st='maint';} } });
}
pmRecompute();
function pmChip(o){var m={scheduled:['#2f86d6','Scheduled'],in_progress:['#b9791a','In Progress'],completed:['#2f8a1f','Released'],cancelled:['#9aa7ad','Cancelled']};var s=pmOverdue(o)?['#e2473d','Overdue']:(m[o.status]||['#9aa7ad',o.status]);return '<span class="chip" style="background:'+s[0]+'1a;color:'+s[0]+'"><span class="cd" style="background:'+s[0]+'"></span>'+s[1]+'</span>';}
let _pmDraft=null;
function pmCreateOpen(){_pmDraft={veh:'',job:'',from:pmISO(0),to:pmISO(0),bay:'Bay 1',tech:PM_TECHS[0],priority:'Normal',notes:''};pmRenderModal();}
function pmRenderModal(){
 var avail=VEH.filter(v=>!PM_ORDERS.some(o=>pmActive(o)&&o.veh===v.id));
 var vehOpts='<option value="">\u2014 Select vehicle \u2014</option>'+avail.map(v=>'<option value="'+v.id+'" '+(_pmDraft.veh===v.id?'selected':'')+'>'+v.id+' \u00b7 '+v.type+' ('+pmStLabel(v.st)+')</option>').join('');
 var jobOpts='<option value="">\u2014 Select job \u2014</option>'+PM_JOBS.map(j=>'<option value="'+j.id+'" '+(_pmDraft.job===j.id?'selected':'')+'>'+j.icon+' '+j.name+' \u00b7 '+j.cat+'</option>').join('');
 var bayOpts=PM_BAYS.map(b=>'<option '+(_pmDraft.bay===b?'selected':'')+'>'+b+'</option>').join('');
 var techOpts=PM_TECHS.map(tc=>'<option '+(_pmDraft.tech===tc?'selected':'')+'>'+tc+'</option>').join('');
 var prioOpts=PM_PRIOS.map(p=>'<option '+(_pmDraft.priority===p?'selected':'')+'>'+p+'</option>').join('');
 showModal(`<div class="modal" style="max-width:680px" onclick="event.stopPropagation()">
  <div class="modal-h"><h3>Create Preventive Maintenance Order</h3><button class="x" onclick="closeModal()">\u00d7</button></div>
  <div class="modal-b" style="max-height:80vh;overflow:auto">
   <div class="pm-form">
    <div style="grid-column:1/-1"><label class="flabel">Vehicle</label><select class="finput" onchange="pmDraftSet('veh',this.value)">${vehOpts}</select></div>
    <div style="grid-column:1/-1"><label class="flabel">Maintenance Job</label><select class="finput" onchange="pmDraftSet('job',this.value)">${jobOpts}</select></div>
    <div><label class="flabel">Blocked From</label><input id="pmFrom" class="finput" type="date" value="${_pmDraft.from}" onchange="pmDraftSet('from',this.value)"></div>
    <div><label class="flabel">Blocked To</label><input id="pmTo" class="finput" type="date" value="${_pmDraft.to}" min="${_pmDraft.from}" onchange="pmDraftSet('to',this.value)"></div>
    <div><label class="flabel">Workshop Bay</label><select class="finput" onchange="pmDraftSet('bay',this.value)">${bayOpts}</select></div>
    <div><label class="flabel">Technician</label><select class="finput" onchange="pmDraftSet('tech',this.value)">${techOpts}</select></div>
    <div><label class="flabel">Priority</label><select class="finput" onchange="pmDraftSet('priority',this.value)">${prioOpts}</select></div>
    <div style="grid-column:1/-1"><label class="flabel">Notes</label><textarea class="finput" rows="2" oninput="_pmDraft.notes=this.value" placeholder="Reported issue, parts to order, special instructions\u2026">${_pmDraft.notes}</textarea></div>
   </div>
   <div id="pmSummary" class="pm-summary"></div>
   <div class="flex" style="justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn g" onclick="closeModal()">Cancel</button><button class="btn p" onclick="pmCreateSubmit()">Create PM Order &amp; Lock Vehicle</button></div>
  </div></div>`);
 pmUpdateSummary();
}
function pmDraftSet(k,v){_pmDraft[k]=v;
 if(k==='job'){var j=pmJob(v);var fo=pmDayOffset(_pmDraft.from);_pmDraft.to=pmISO(fo+((j.dur||1)-1));var toEl=document.getElementById('pmTo');if(toEl)toEl.value=_pmDraft.to;}
 if(k==='from'){var toEl2=document.getElementById('pmTo');if(toEl2)toEl2.min=v;if(pmDayOffset(_pmDraft.to)<pmDayOffset(v)){_pmDraft.to=v;if(toEl2)toEl2.value=v;}}
 pmUpdateSummary();
}
function pmUpdateSummary(){var el=document.getElementById('pmSummary');if(!el)return;var v=_pmDraft.veh,j=_pmDraft.job?pmJob(_pmDraft.job):null;var days=Math.max(1,pmDayOffset(_pmDraft.to)-pmDayOffset(_pmDraft.from)+1);el.innerHTML=(v&&j)?('<b>'+v+'</b> will be blocked for <b>'+j.name+'</b> from <b>'+pmFmt(_pmDraft.from)+'</b> to <b>'+pmFmt(_pmDraft.to)+'</b> \u00b7 <b>'+days+' day'+(days>1?'s':'')+'</b> \u2014 removed from Planning Board capacity for the window.'):'Select a vehicle and a job to preview the planning impact.';}
function pmCreateSubmit(){if(!_pmDraft.veh||!_pmDraft.job){schToast('Select a vehicle and a maintenance job.');return;}if(pmDayOffset(_pmDraft.to)<pmDayOffset(_pmDraft.from)){schToast('End date cannot be before start date.');return;}var status=pmDayOffset(_pmDraft.from)<=0?'in_progress':'scheduled';PM_ORDERS.unshift({id:pmNewId(),veh:_pmDraft.veh,job:_pmDraft.job,from:_pmDraft.from,to:_pmDraft.to,bay:_pmDraft.bay,tech:_pmDraft.tech,priority:_pmDraft.priority,notes:_pmDraft.notes,cost:0,status:status});pmRecompute();closeModal();render();}
function pmStart(id){var o=PM_ORDERS.find(x=>x.id===id);if(!o)return;o.status='in_progress';if(pmDayOffset(o.from)>0)o.from=pmISO(0);pmRecompute();render();}
function pmCancel(id){var o=PM_ORDERS.find(x=>x.id===id);if(!o)return;o.status='cancelled';pmRecompute();render();}
function pmExtendOpen(id){var o=PM_ORDERS.find(x=>x.id===id);if(!o)return;var minOff=pmDayOffset(o.to)+1;showModal(`<div class="modal sm" onclick="event.stopPropagation()"><div class="modal-h"><h3>Extend ${id}</h3><button class="x" onclick="closeModal()">\u00d7</button></div><div class="modal-b"><div style="font-size:12px;color:var(--mut);margin-bottom:11px;line-height:1.5">Current block ends <b>${pmFmt(o.to)}</b>. Vehicle <b>${o.veh}</b> stays out of planning until the new end date.</div><label class="flabel">New end date</label><input id="pmExtTo" class="finput" type="date" value="${pmISO(minOff)}" min="${pmISO(minOff)}"><label class="flabel" style="margin-top:10px">Reason</label><select id="pmExtReason" class="finput"><option>Awaiting parts</option><option>Additional fault found</option><option>Vendor delay</option><option>Re-inspection required</option></select><div class="flex" style="justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn g" onclick="closeModal()">Cancel</button><button class="btn p" onclick="pmExtend('${id}')">Extend block</button></div></div></div>`);}
function pmExtend(id){var o=PM_ORDERS.find(x=>x.id===id);if(!o)return;var to=document.getElementById('pmExtTo').value,r=document.getElementById('pmExtReason').value;if(pmDayOffset(to)<pmDayOffset(o.from)){schToast('Invalid date');return;}o.to=to;o.extended=true;o.notes=(o.notes?o.notes+' \u00b7 ':'')+'Extended: '+r;pmRecompute();closeModal();render();}
function pmReleaseOpen(id){var o=PM_ORDERS.find(x=>x.id===id);if(!o)return;var checks=['Road test completed','Brakes & steering OK','Lights & electricals OK','Fluids topped up','No active fault codes','Documents valid'];showModal(`<div class="modal" style="max-width:520px" onclick="event.stopPropagation()"><div class="modal-h"><h3>Release ${o.veh} \u2014 Roadworthy Sign-off</h3><button class="x" onclick="closeModal()">\u00d7</button></div><div class="modal-b"><div style="font-size:12px;color:var(--mut);margin-bottom:11px">${pmJob(o.job).name} \u00b7 ${id}. Confirm the vehicle is roadworthy to return it to planning capacity.</div><div class="pm-check">`+checks.map(c=>'<label class="pm-ck"><input type="checkbox" checked> '+c+'</label>').join('')+`</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px"><div><label class="flabel">Final odometer (km)</label><input class="finput" type="number" placeholder="e.g. 184500"></div><div><label class="flabel">Total cost (QAR)</label><input id="pmCost" class="finput" type="number" placeholder="parts + labour"></div></div><div style="font-size:11px;color:var(--mut);margin-top:8px">Cost rolls into vehicle profitability & Reports.</div><div class="flex" style="justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn g" onclick="closeModal()">Cancel</button><button class="btn p" onclick="pmRelease('${id}')">Release Vehicle</button></div></div></div>`);}
function pmRelease(id){var o=PM_ORDERS.find(x=>x.id===id);if(!o)return;var c=document.getElementById('pmCost');if(c&&c.value)o.cost=+c.value;o.status='completed';o.releasedOn=pmISO(0);pmRecompute();closeModal();render();}
function vWorkshop(){
 pmRecompute();
 var open=PM_ORDERS.filter(pmActive).length;
 var blocked=VEH.filter(v=>v._pmManaged).length;
 var overdue=PM_ORDERS.filter(pmOverdue).length;
 var DAYS=14;
 var dayHdr='';for(var d=0;d<DAYS;d++){var dt=new Date(PM_TODAY.getTime()+d*86400000);dayHdr+='<div class="pm-dh'+(d===0?' today':'')+'">'+dt.toLocaleDateString('en-GB',{weekday:'short'}).slice(0,2)+'<b>'+dt.getDate()+'</b></div>';}
 var tlRows=PM_ORDERS.filter(o=>o.status!=='cancelled').map(function(o){
   var fO=pmDayOffset(o.from),tO=pmDayOffset(o.to);var bar='';
   if(!(tO<0||fO>DAYS-1)){var fo=Math.max(0,fO),to=Math.min(DAYS-1,tO);var left=fo/DAYS*100,width=(to-fo+1)/DAYS*100;var col=pmOverdue(o)?'#e2473d':(o.status==='in_progress'?'#b9791a':o.status==='completed'?'#2f8a1f':'#2f86d6');bar='<div class="pm-tl-bar" style="left:'+left+'%;width:'+width+'%;background:'+col+'">'+pmJob(o.job).icon+' '+pmJob(o.job).name+'</div>';}
   return '<div class="pm-tl-row"><div class="pm-tl-veh"><b>'+o.veh+'</b><span>'+(pmVeh(o.veh)?pmVeh(o.veh).type:'')+'</span></div><div class="pm-tl-track"><div class="pm-tl-grid">'+Array(DAYS).fill('<span></span>').join('')+'</div>'+bar+'</div></div>';
 }).join('');
 var rows=PM_ORDERS.map(function(o){
   var j=pmJob(o.job),days=pmDayOffset(o.to)-pmDayOffset(o.from)+1,actions='';
   if(o.status==='scheduled')actions='<button class="btn c" style="font-size:11px;padding:4px 10px" onclick="pmStart(\''+o.id+'\')">Start</button> <button class="btn g" style="font-size:11px;padding:4px 9px" onclick="pmExtendOpen(\''+o.id+'\')">Extend</button> <button class="btn g" style="font-size:11px;padding:4px 8px" onclick="pmCancel(\''+o.id+'\')">Cancel</button>';
   else if(o.status==='in_progress')actions='<button class="btn p" style="font-size:11px;padding:4px 10px" onclick="pmReleaseOpen(\''+o.id+'\')">Release</button> <button class="btn g" style="font-size:11px;padding:4px 9px" onclick="pmExtendOpen(\''+o.id+'\')">Extend</button>';
   else actions='<span class="muted" style="font-size:11px">'+(o.status==='completed'?'Released '+(o.releasedOn?pmFmt(o.releasedOn):''):'Cancelled')+'</span>';
   return '<tr><td><b>'+o.id+'</b>'+(o.extended?' <span class="tag" style="background:#f5a6231a;color:#b9791a">extended</span>':'')+'</td><td><b>'+o.veh+'</b><div class="muted" style="font-size:11px">'+(pmVeh(o.veh)?pmVeh(o.veh).type:'')+'</div></td><td>'+j.icon+' '+j.name+'<div class="muted" style="font-size:11px">'+j.cat+'</div></td><td>'+pmFmt(o.from)+' \u2192 '+pmFmt(o.to)+'<div class="muted" style="font-size:11px">'+days+' day'+(days>1?'s':'')+'</div></td><td>'+o.bay+'<div class="muted" style="font-size:11px">'+o.tech+'</div></td><td>'+pmChip(o)+'</td><td>'+(pmActive(o)?'<span class="chip" style="background:#e2473d1a;color:#e2473d"><span class="cd" style="background:#e2473d"></span>Locked</span>':'<span class="chip" style="background:#3fae2a1a;color:#2f8a1f"><span class="cd" style="background:#3FAE2A"></span>Available</span>')+'</td><td style="white-space:nowrap">'+actions+'</td></tr>';
 }).join('');
 return '<div class="banner mb"><b>Workshop \u2014 Preventive Maintenance</b> Create a PM order to block a vehicle for a defined window; locked vehicles drop out of Planning Board capacity until released. Extend a block when work overruns, or release the vehicle once it is roadworthy.</div>'
 +'<div class="row mb">'+kpi('Open PM Orders',open,'scheduled + active',false,'--amber')+kpi('Vehicles Locked',blocked,'out of planning now',blocked===0,'--red')+kpi('Overdue Blocks',overdue,'past end date',overdue===0,overdue?'--red':'--green')+kpi('PM Compliance','91%','on-time service',true,'--green')+'</div>'
 +'<div class="card mb"><div class="card-h"><h3>Maintenance Block Calendar</h3><span class="tag">next 14 days</span><div class="act"><button class="btn p" onclick="pmCreateOpen()">+ Create PM Order</button></div></div><div class="pad"><div class="pm-tl-head"><div></div><div class="pm-grid14">'+dayHdr+'</div></div>'+(tlRows||'<div class="muted" style="padding:14px;text-align:center">No maintenance blocks scheduled.</div>')+'</div></div>'
 +'<div class="grid" style="grid-template-columns:1.65fr .85fr;gap:16px"><div class="card"><div class="card-h"><h3>PM Order Queue</h3><span class="tag">planner exclusion active</span><div class="act"><button class="btn g" onclick="pmCreateOpen()">+ New</button></div></div><div style="overflow:auto"><table><thead><tr><th>PM Order</th><th>Vehicle</th><th>Job</th><th>Window</th><th>Bay / Tech</th><th>Status</th><th>Planning</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div></div><div class="card"><div class="card-h"><h3>Planning Impact</h3><span class="tag">capacity control</span></div><div class="pad">'+['Locked vehicles are hidden from the optimizer and Planning Board','Scheduled blocks reserve the vehicle ahead of the window','Extending a block keeps the vehicle out until the new end date','Release requires a roadworthy checklist sign-off','PM cost rolls into vehicle profitability & Reports'].map(function(x){return '<div class="trigger-row"><span>'+x+'</span><span style="color:#2f8a1f;font-weight:800">\u2713</span></div>';}).join('')+'</div></div></div>';
}

function openTemplateEditor(id,name){

  var hrs='<div class="sch-hours"><div class="corner">'+(group==='gate'?'Gate':'Dock')+'</div>';for(var h=f.open;h<f.close;h+=60){hrs+='<div class="hr">'+schFmt(h)+'</div>';}hrs+='</div>';
  var rows=lanes.map(function(L){var lane=bks.filter(L.fil).sort(function(a,b){return a.start-b.start;}).map(function(b){var left=(b.start-f.open)/span*100,w=b.dur/span*100,c=schColor(b.status);return '<div class="sch-appt'+(conf[b.bk]?' conf':'')+'" style="left:'+left+'%;width:'+w+'%;'+schApptStyle(b,c)+'" onclick="schOpenBooking(\''+b.bk+'\')"><b>'+b.carrier+'</b><small>'+schFmt(b.start)+'-'+schFmt(b.start+b.dur)+' · '+b.oid+'</small>'+schAppointmentStatus(b)+schMheBadge(b)+'</div>';}).join('');return '<div class="sch-row"><div class="sch-door"><b>'+L.id+'</b><small>'+L.sub+'</small></div><div class="sch-lane">'+lane+'</div></div>';}).join('');
  return '<div class="sch-cal"><div class="sch-scroll"><div class="sch-grid">'+hrs+rows+'</div></div></div>';
}
