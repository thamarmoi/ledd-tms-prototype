<!DOCTYPE html>
<!-- GWC LEDD — TMS + VTS Desktop Prototype v1.0
     Single-file clickable mockup. In-memory state only (no browser storage).
     Brand: GWC green #3FAE2A, cyan #00ABC7. Bilingual EN/AR (RTL). For demonstration only. -->
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GWC TMS · VTS — Prototype v12</title>
<style>
:root{
  --green:#3FAE2A; --green-d:#2f8a1f; --cyan:#00ABC7; --cyan-d:#0089a0;
  --ink:#0e2730; --ink2:#15333d; --sidebar:#1a7896; --sidebar2:#115f73;
  --bg:#e8f4f7; --card:#ffffff; --line:#d8edf2; --txt:#1f2d33; --mut:#6c7c83;
  --amber:#f5a623; --red:#e2473d; --blue:#2f86d6; --grey:#9aa7ad;
  --shadow:0 1px 2px rgba(14,39,48,.06),0 6px 18px rgba(14,39,48,.06);
  --radius:14px;
  --font:'Proxima Nova','Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
/* ---------- Sidebar ---------- */
.sidebar{width:248px;background:linear-gradient(180deg,var(--sidebar),var(--sidebar2));color:#cfe0e4;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex:0 0 248px}
.brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.brand img{height:30px}
.brand .sub{font-size:10px;letter-spacing:.16em;color:var(--cyan);font-weight:700;margin-top:3px}
.navwrap{overflow:auto;padding:10px 12px 24px;flex:1}
.navgrp{margin-top:16px}
.navgrp .lbl{font-size:10px;letter-spacing:.16em;color:#6f8a92;font-weight:700;padding:6px 12px;text-transform:uppercase}
.navi{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;color:#bcd0d6;font-weight:500;margin:2px 0;transition:.15s;white-space:nowrap}
.navi:hover{background:rgba(255,255,255,.06);color:#fff}
.navi.on{background:linear-gradient(90deg,rgba(63,174,42,.22),rgba(0,171,199,.16));color:#fff;box-shadow:inset 3px 0 0 var(--green)}
.navi .ic{width:18px;height:18px;flex:0 0 18px;opacity:.95}
.navi.on .ic{opacity:1}
.sidefoot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#6f8a92}
/* ---------- Topbar ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:62px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:20}
.crumb{font-weight:700;font-size:17px;color:var(--ink)}
.crumb small{display:block;font-weight:500;font-size:11px;color:var(--mut)}
.search{margin-inline-start:auto;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px 12px;width:280px;color:var(--mut)}
.search input{border:0;background:none;outline:0;width:100%;font-family:inherit;font-size:13px;color:var(--txt)}
.tbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);position:relative}
.tbtn:hover{background:var(--bg)}
.lang{font-weight:700;font-size:12px;letter-spacing:.04em}
.dot-badge{position:absolute;top:7px;inset-inline-end:8px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid #fff}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
/* ---------- Content ---------- */
.content{padding:24px;overflow:auto;flex:1;display:flex;flex-direction:column}
.row{display:flex;gap:16px;flex-wrap:wrap}
.grid{display:grid;gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:18px}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
.card-h h3{margin:0;font-size:14px;color:var(--ink)}
.card-h .act{margin-inline-start:auto;display:flex;gap:8px}
.kpi{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .v{font-size:26px;font-weight:800;color:var(--ink);line-height:1.1}
.kpi .l{font-size:12px;color:var(--mut);margin-top:3px}
.kpi .d{font-size:11px;font-weight:700;margin-top:8px}
.kpi .bar{position:absolute;top:0;inset-inline-start:0;width:4px;height:100%}
.up{color:var(--green)} .down{color:var(--red)}
.ind-up{color:#2e7d32;font-weight:700} .ind-dn{color:#c62828;font-weight:700}
.cell-pos{background:#e8f5e9} .cell-neg{background:#fce4ec}
.arr-up::before{content:"▲ "} .arr-dn::before{content:"▼ "}
.btn{border:0;border-radius:9px;padding:9px 15px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px}
.btn.p{background:var(--green);color:#fff} .btn.p:hover{background:var(--green-d)}
.btn.c{background:var(--cyan);color:#fff} .btn.c:hover{background:var(--cyan-d)}
.btn.g{background:var(--bg);color:var(--ink);border:1px solid var(--line)} .btn.g:hover{background:#e6ebed}
table{width:100%;border-collapse:collapse}
th{text-align:start;font-size:11px;letter-spacing:.04em;color:#fff;text-transform:uppercase;padding:11px 14px;border-bottom:1px solid var(--line);background:#1a6b7c;font-weight:700}
td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13px}
tr:last-child td{border-bottom:0}
tr.click{cursor:pointer} tr.click:hover{background:#f6fbf8}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.chip .cd{width:6px;height:6px;border-radius:50%}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:var(--bg);color:var(--mut)}
.pill{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--mut)}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.muted{color:var(--mut)}
.flex{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mt{margin-top:16px}.mb{margin-bottom:16px}
h2.sec{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:4px 0 0}
/* progress */
.prog{height:7px;border-radius:6px;background:var(--bg);overflow:hidden}
.prog > i{display:block;height:100%;border-radius:6px}
/* timeline */
.tl{position:relative;padding-inline-start:22px}
.tl:before{content:"";position:absolute;inset-inline-start:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl .ev{position:relative;padding:0 0 16px}
.tl .ev:before{content:"";position:absolute;inset-inline-start:-19px;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid var(--green)}
.tl .ev.cyan:before{border-color:var(--cyan)} .tl .ev.mut:before{border-color:var(--grey)}
.tl .t{font-weight:700;font-size:13px} .tl .s{font-size:12px;color:var(--mut)}
/* map */
.map{position:relative;height:520px;border-radius:var(--radius);overflow:hidden;background:
  radial-gradient(1100px 500px at 70% -10%,#13343f,#0c242c);border:1px solid var(--line)}
.map .roads line{stroke:rgba(255,255,255,.10);stroke-width:2}
.map .roads .hw{stroke:rgba(0,171,199,.30);stroke-width:3}
.zone{position:absolute;color:#5d7d86;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.veh{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:3}
.veh .pin{width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 4px rgba(255,255,255,.08)}
.veh.sel .pin{box-shadow:0 0 0 5px rgba(63,174,42,.5)}
.veh .pulse{position:absolute;inset:-4px;border-radius:50%;opacity:.55;animation:pulse 2.4s infinite ease-out}
@keyframes pulse{0%{transform:scale(.6);opacity:.6}100%{transform:scale(2.6);opacity:0}}
.mapcard{position:absolute;inset-inline-end:14px;top:14px;width:280px;background:rgba(12,36,44,.92);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#dceaed;padding:14px;z-index:5}
.maplegend{position:absolute;inset-inline-start:14px;bottom:14px;background:rgba(12,36,44,.85);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;color:#cfe0e4;font-size:11px;z-index:5;display:flex;gap:14px;flex-wrap:wrap}
.maplegend .li{display:flex;align-items:center;gap:6px}
.maplegend .cd{width:9px;height:9px;border-radius:50%}
/* drawer */
.scrim{position:fixed;inset:0;background:rgba(14,39,48,.4);z-index:40;display:none}
.scrim.on{display:block}
.drawer{position:fixed;top:0;inset-inline-end:0;height:100vh;width:520px;max-width:94vw;background:var(--bg);z-index:50;box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:.25s;overflow:auto}
html[dir=rtl] .drawer{transform:translateX(-100%)}
.drawer.on{transform:none}
.drawer .dh{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;gap:10px;z-index:2}
.drawer .db{padding:18px 20px}
.x{margin-inline-start:auto;cursor:pointer;color:var(--mut);font-size:20px;line-height:1;border:0;background:none}
.kv{display:grid;grid-template-columns:130px 1fr;gap:8px 12px;font-size:13px}
.kv .k{color:var(--mut)}
.bars{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:10px}
.bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%}
.bars .b .bar{width:60%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--cyan),var(--green))}
.bars .b small{font-size:10px;color:var(--mut)}
.note{font-size:11px;color:var(--mut);margin-top:8px}
.banner{background:linear-gradient(90deg,rgba(0,171,199,.10),rgba(63,174,42,.08));border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-size:12.5px;color:var(--ink2);display:flex;gap:10px;align-items:center}
.alert{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);align-items:flex-start}
.alert:last-child{border-bottom:0}
.alert .ad{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 8px}
.alert .at{font-weight:700;font-size:12.5px} .alert .as{font-size:11.5px;color:var(--mut)}
.alert .tm{margin-inline-start:auto;font-size:11px;color:var(--grey);white-space:nowrap}
@media(max-width:1080px){.sidebar{display:none}}
/* ---------- Modal ---------- */
.modal-scrim{position:fixed;inset:0;background:rgba(14,39,48,.45);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--radius);box-shadow:0 24px 80px rgba(0,0,0,.22);width:100%;max-width:480px;overflow:hidden}
.modal.sm{max-width:380px}
.modal-h{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{margin:0;font-size:16px;color:var(--ink)}
.modal-b{padding:20px}
.frow{display:grid;gap:14px;margin-bottom:14px}
.frow.two{grid-template-columns:1fr 1fr}
.frow.three{grid-template-columns:1fr 1fr 1fr}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.finput{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--card);outline:none;transition:.15s}
.finput:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,171,199,.12)}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
/* ---------- Plan result banner ---------- */
.plan-result{border-radius:10px;padding:12px 16px;font-size:12.5px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.plan-result.ok{background:rgba(63,174,42,.07);border:1px solid var(--green);color:var(--ink)}
.plan-result.info{background:rgba(0,171,199,.07);border:1px solid var(--cyan);color:var(--ink)}
.assign-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--bg);border:1px solid var(--line);margin:2px}
/* ---------- Orders search ---------- */
.ord-search{position:relative;flex:1;max-width:320px}
.ord-search input{width:100%;padding:8px 11px 8px 32px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--txt);background:var(--card);outline:none}
.ord-search input:focus{border-color:var(--cyan)}
.ord-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none;font-size:14px}
/* ---- Planning stats bar ---- */
.plan-stats{display:flex;gap:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;flex-wrap:wrap}
.pstat{flex:1;padding:10px 14px;text-align:center;border-right:1px solid var(--line);min-width:90px}
.pstat:last-child{border-right:0}
.pstat .pv{font-size:17px;font-weight:800;color:#1a6b7c;line-height:1.2}
.pstat .pvsub{font-size:9px;color:var(--mut);font-weight:600;letter-spacing:.03em}
.pstat .pl{font-size:10px;color:var(--mut);margin-top:2px}
/* ---- Plan tabs ---- */
.plan-tab{padding:8px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:600;color:var(--mut);transition:.12s}
.plan-tab.on{border-bottom-color:#1a6b7c;color:#1a6b7c;font-weight:700}
/* ---- Gantt Timeline ---- */
.gantt-wrap{border-radius:var(--radius);border:1px solid var(--line);background:var(--card);overflow:hidden}
.gantt-head{display:flex;border-bottom:1px solid var(--line);background:#fafbfb}
.gantt-info-h{width:240px;flex:0 0 240px;padding:6px 12px;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;border-right:1px solid var(--line)}
.gantt-ruler{flex:1;display:flex;overflow:hidden}
.gantt-tick{flex:1;text-align:center;font-size:10px;color:var(--mut);font-weight:700;padding:6px 0;border-left:1px solid var(--line)}
.gtour{display:flex;align-items:center;border-bottom:1px solid var(--line);cursor:pointer}
.gtour:last-child{border-bottom:0}
.gtour:hover{background:#f6fbf8}
.gtour-info{width:240px;flex:0 0 240px;padding:8px 12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--line)}
.gtour-track{flex:1;position:relative;height:46px;background:#fafbfb;overflow:hidden}
.gtour:hover .gtour-track{background:#f0faf4}
.gblock{position:absolute;top:9px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;z-index:2;overflow:hidden;min-width:20px;transition:.1s}
.gblock:hover{filter:brightness(1.12);transform:scaleY(1.07);z-index:3}
/* ---- Executed vs Planned strip ---- */
.xp-wrap{background:var(--bg);border-radius:10px;padding:14px;overflow-x:auto}
.xp-ruler-row{display:flex;margin-left:90px;margin-bottom:4px}
.xp-ruler-tick{flex:1;font-size:10px;color:var(--mut);font-weight:700;text-align:center;min-width:44px}
.xp-row{display:flex;align-items:center;margin-bottom:8px}
.xp-row:last-child{margin-bottom:0}
.xp-lbl{width:90px;font-size:11px;font-weight:700;color:var(--mut);white-space:nowrap}
.xp-track{flex:1;position:relative;height:32px;min-width:440px}
.xp-block{position:absolute;top:4px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;cursor:pointer}
/* ---- Driver Roster ---- */
.roster-wrap{overflow-x:auto}
.roster-tbl{border-collapse:collapse;width:100%;min-width:920px}
.roster-tbl th{background:#1a6b7c;color:#fff;padding:10px 12px;font-size:11px;font-weight:700;text-align:start;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap}
.roster-tbl td{padding:5px 7px;border:1px solid var(--line);background:var(--card);vertical-align:top;min-width:110px}
.roster-tbl td.rname{min-width:170px;background:#fafbfb}
.rshift{border-radius:7px;padding:5px 8px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:4px;user-select:none}
.rshift.ms{background:#dbeafe;color:#1d4ed8}
.rshift.es{background:#fef3c7;color:#b45309}
.rshift.ns{background:#ede9fe;color:#6d28d9}
.rshift.off{background:var(--bg);color:var(--mut);font-style:italic}
.rshift .rbtn{font-size:12px;border:0;background:none;cursor:pointer;color:inherit;opacity:.5;padding:0 2px;line-height:1}
.rshift .rbtn:hover{opacity:1}
/* ===== Order Creation Wizard ===== */
.wiz-modal{max-width:880px;width:96vw;max-height:93vh;display:flex;flex-direction:column;overflow:hidden}
.wdot{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:.15s;flex:0 0 26px}
.wdot.done{background:#1a6b7c;color:#fff}.wdot.active{background:#3FAE2A;color:#fff;box-shadow:0 0 0 4px #3fae2a25}.wdot.todo{background:var(--bg);border:2px solid var(--line);color:var(--mut)}
.wlbl{font-size:9px;font-weight:600;white-space:nowrap;color:var(--mut)}.wlbl.active{color:#3FAE2A;font-weight:700}
.wconn{width:16px;height:2px;flex:0 0 16px;border-radius:1px;background:var(--line)}.wconn.done{background:#1a6b7c}
.wiz-body{flex:1;overflow-y:auto;padding:20px 24px}
.wiz-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card)}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-top:10px}
.svc-card{border:2px solid var(--line);border-radius:12px;padding:18px 10px;text-align:center;cursor:pointer;transition:.15s;background:var(--card);position:relative}
.svc-card:hover{border-color:#1a6b7c;transform:translateY(-2px);box-shadow:0 4px 12px #0002}
.svc-card.sel{border-color:#3FAE2A;background:linear-gradient(135deg,#f0fff4,#e8fbed)}
.svc-card.sel::after{content:"✓";position:absolute;top:6px;right:8px;color:#3FAE2A;font-weight:800;font-size:13px}
.svc-card .sci{font-size:28px;display:block;margin-bottom:7px;line-height:1}
.svc-card .scl{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.3}
.svc-card .scs{font-size:10px;color:var(--mut);margin-top:3px}
.cargo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:7px;margin-top:10px}
.cargo-chip{border:2px solid var(--line);border-radius:8px;padding:9px 5px;text-align:center;cursor:pointer;transition:.12s;background:var(--card)}
.cargo-chip:hover{border-color:#00ABC7}.cargo-chip.sel{border-color:#00ABC7;background:#e0f7fa}
.cargo-chip .cci{font-size:18px;margin-bottom:3px;display:block}.cargo-chip .ccl{font-size:11px;font-weight:600;color:var(--ink)}
.equip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:7px;margin-top:8px}
.equip-card{border:2px solid var(--line);border-radius:8px;padding:9px 6px;text-align:center;cursor:pointer;transition:.12s;font-size:11px;font-weight:600;color:var(--ink);background:var(--card)}
.equip-card:hover{border-color:#1a6b7c}.equip-card.sel{border-color:#1a6b7c;background:#e6f3f5;color:#1a6b7c}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.act-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;transition:.12s;font-size:11.5px}
.act-item:hover{border-color:#1a6b7c;background:#f0f8ff}.act-item.on{border-color:#3FAE2A;background:#f0fff4}
.rec-box{background:linear-gradient(135deg,#e6f3f5,#e8fbed);border:1.5px solid #1a6b7c;border-radius:12px;padding:14px;margin-bottom:14px}
.rec-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#1a6b7c;margin-bottom:8px}
.rec-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #c8e6ea}
.rec-row:last-child{border-bottom:0}
.rec-badge{background:#1a6b7c;color:#fff;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;flex:0 0 auto;white-space:nowrap}
.loc-tabs{display:flex;gap:7px;margin-bottom:12px}
.loc-tab{padding:5px 14px;border:1.5px solid var(--line);border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--mut);transition:.12s}
.loc-tab.on{border-color:#1a6b7c;color:#1a6b7c;background:#e6f3f5}
.loc-inp{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;font-size:12.5px;outline:none;box-sizing:border-box;transition:.12s;font-family:inherit}
.loc-inp:focus{border-color:#1a6b7c;box-shadow:0 0 0 3px #1a6b7c10}
.rev-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
.rev-row:last-child{border-bottom:0}
.rev-k{font-size:11px;color:var(--mut);width:130px;flex:0 0 130px;padding-top:1px}
.rev-v{font-size:12.5px;font-weight:600;color:var(--ink);flex:1;word-break:break-word}
/* ===== Contracts Module ===== */
.ct-tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:16px}
.ct-tab{padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--mut);transition:.12s}
.ct-tab.on{border-bottom-color:#1a6b7c;color:#1a6b7c}
.acc-sec{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:8px}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;background:var(--card);user-select:none;transition:.1s}
.acc-hdr:hover{background:#f6fbf8}.acc-hdr b{font-size:13px;color:var(--ink)}
.acc-tog{font-size:16px;color:var(--mut);transition:.2s;display:inline-block}
.acc-body{padding:16px;border-top:1px solid var(--line);background:#fafcfc}
.acc-body.hidden{display:none}
.rate-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:8px;margin-bottom:10px}
.pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:12px}
.pkg-card{border:2px solid var(--line);border-radius:10px;padding:13px;cursor:pointer;transition:.14s;background:var(--card)}
.pkg-card:hover{border-color:#1a6b7c;background:#f0f8ff}.pkg-card.sel{border-color:#3FAE2A;background:#f0fff4}
.pkg-nm{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px}
.pkg-ds{font-size:10px;color:var(--mut);line-height:1.4}
.cst-a{background:#3fae2a1a;color:#2f8a1f}.cst-d{background:#f0f6ff;color:#2f86d6}.cst-e{background:#e2473d1a;color:#e2473d}.cst-p{background:#f5a6231a;color:#b9791a}
.map-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1000;pointer-events:none}
.truck-marker{position:absolute;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;pointer-events:auto;transition:.15s;transform:translate(-50%,-50%);filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.truck-marker:hover{transform:translate(-50%,-50%) scale(1.15)}
.truck-popup{position:fixed;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;box-shadow:0 4px 16px rgba(0,0,0,.18);font-size:12px;z-index:1000;min-width:240px}
.truck-popup-close{position:absolute;top:4px;right:8px;cursor:pointer;font-size:16px;color:var(--mut);background:none;border:none;padding:2px 4px}
</style>
</head>

    {n:"Vessel / Port Data",st:"Pending",c:"--amber"},{n:"Customer Systems (API)",st:"Connected",c:"--green"},
    {n:"Payment Gateway",st:"Connected",c:"--green"},{n:"Middleware / ESB",st:"Connected",c:"--green"}
  ];
  const tenantData=["Customers","Contracts","Fleet","Drivers","Orders","Tariffs","Documents"];
  return`
  <div class="banner mb" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <span>⚙ <b>Platform & Tenant</b> — commercialization readiness for white-label / multi-tenant deployment under LEDD</span>
    <span class="tag" style="background:#3fae2a1a;color:#2f8a1f">Generic GCC architecture</span>
  </div>
  <div class="grid mb" style="grid-template-columns:1.3fr 1fr;gap:16px">
    <div class="card">
      <div class="card-h"><h3>🎨 Tenant Branding</h3><span class="tag">White-label</span></div>
      <div class="pad">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div><label class="flabel">Tenant Name</label><input class="finput" value="GWC Logistics"/></div>
          <div><label class="flabel">Deployment Mode</label><select class="finput"><option>Single-Tenant</option><option>Multi-Tenant (shared)</option><option>White-Label / OEM</option></select></div>
          <div><label class="flabel">Logo</label><div style="display:flex;align-items:center;gap:8px"><div style="width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,#1a7896,var(--cyan));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800">G</div><button class="btn g" style="font-size:11px">Upload Logo</button></div></div>
          <div><label class="flabel">Sub-domain</label><input class="finput" value="gwc.ledd-tms.com"/></div>
        </div>
        <label class="flabel" style="margin-bottom:8px;display:block">Theme Colours <span style="font-size:10px;color:var(--mut)">— click to preview live</span></label>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${TENANT_THEMES.map(th=>`<div onclick="applyTenantTheme('${th.id}')" style="cursor:pointer;border:2px solid ${_activeTheme===th.id?th.primary:"var(--line)"};border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:92px;background:${_activeTheme===th.id?"#f4fafc":"var(--card)"}">
            <div style="display:flex;gap:3px"><span style="width:18px;height:18px;border-radius:4px;background:${th.sidebar}"></span><span style="width:18px;height:18px;border-radius:4px;background:${th.primary}"></span><span style="width:18px;height:18px;border-radius:4px;background:${th.accent}"></span></div>
            <span style="font-size:10.5px;font-weight:600;color:var(--ink)">${th.name}</span>
            ${_activeTheme===th.id?`<span style="font-size:9px;color:#2f8a1f;font-weight:700">● Active</span>`:""}
          </div>`).join("")}
        </div>
        <div style="margin-top:12px;font-size:10.5px;color:var(--mut)">Branding is applied per tenant — logo, colours and sub-domain are isolated from other tenants.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><h3>🔒 Data Separation</h3><span class="tag" style="background:#1a6b7c1a;color:#1a6b7c">Per-tenant</span></div>
      <div class="pad">
        <div style="font-size:11.5px;color:var(--mut);margin-bottom:10px">Each tenant's operational data is fully isolated:</div>
        ${tenantData.map(d=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px">
          <span>${d}</span><span class="tag" style="background:#3fae2a1a;color:#2f8a1f">Isolated</span></div>`).join("")}
        <div style="margin-top:10px;padding:9px 12px;background:#e8f4f7;border-radius:8px;font-size:10.5px;color:#1a7896">Multi-tenant / white-label / OEM deployment is designed-in now to avoid future re-architecture.</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-h"><h3>🔌 Integrations & Master Data</h3><span class="tag" style="background:#3fae2a1a;color:#2f8a1f">${integrations.filter(i=>i.st==="Connected").length}/${integrations.length} connected</span></div>
    <div class="pad"><div class="grid" style="grid-template-columns:1fr 1fr 1fr 1fr;gap:10px">
      ${integrations.map(ig=>{const c=cssv(ig.c);return`<div style="border:1px solid var(--line);border-radius:9px;padding:11px 12px">
        <div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:5px">${ig.n}</div>
        <span class="chip" style="background:${c}1a;color:${c}"><span class="cd" style="background:${c}"></span>${ig.st}</span>
      </div>`}).join("")}
    </div>
    <div style="margin-top:12px;font-size:10.5px;color:var(--mut)">Configurable per country, currency and local rule set — the same product deploys GCC-wide.</div>
    </div>
  </div>`;
}

/* ---- Control Tower ---- */
function vControl(){
  // === Live stats from actual data ===
  const os={transit:0,delivered:0,delayed:0,unassigned:0,planned:0,exception:0};
  ORDERS.forEach(o=>{if(os[o.status]!==undefined)os[o.status]++;});
  const totalOrders=ORDERS.length;
  const fs={transit:0,loading:0,idle:0,maint:0};
  VEH.forEach(v=>{if(fs[v.st]!==undefined)fs[v.st]++;});
  const totalVeh=VEH.length;
  const otifPct=Math.max(Math.round(os.delivered/totalOrders*100),8);
  const utilPct=Math.round((fs.transit+fs.loading)/totalVeh*100);
  const activeVeh=fs.transit+fs.loading;

  // === Dynamic alert feed ===
  const dynAlerts=[];
  if(os.unassigned>0)dynAlerts.push(["--amber",`${os.unassigned} orders unassigned`,`Awaiting planning — ${os.unassigned} orders need assignment`,"now"]);
  if(os.delayed>0)dynAlerts.push(["--red",`${os.delayed} delayed order${os.delayed>1?"s":""}`,`ETA slipping · immediate attention required`,"—"]);
  if(os.exception>0)dynAlerts.push(["--red",`${os.exception} exception${os.exception>1?"s":""}`,`Require manual intervention`,"—"]);
  VIOL.filter(v=>v.sev==="High").slice(0,3).forEach(v=>dynAlerts.push(["--red",`${v.ty} — ${v.v}`,`${v.d} · ${v.z} · ${v.val}`,v.t]));
  DRV.filter(d=>d.hrs>=9).forEach(d=>dynAlerts.push(["--red",`Fatigue risk — ${d.n}`,`${d.hrs}h driving · near legal limit`,d.hrs+"h"]));
  DRV.filter(d=>d.insp!=="OK").forEach(d=>dynAlerts.push(["--amber",`Inspection ${d.insp} — ${d.n}`,`Checklist pending before next dispatch`,"—"]));
  if(_planResult&&!_dispatched)dynAlerts.push(["--cyan",`Plan ready — ${_planResult.length} orders optimised`,`Auto-Dispatch to activate routes`,"—"]);
  const topAlerts=dynAlerts.slice(0,7);
  const critCount=topAlerts.filter(a=>a[0]==="--red").length;

  // === Zone order counts ===
  const zoneCounts=ZONES.map(z=>({z,l:z.split(" ")[0],v:ORDERS.filter(o=>o.to===z).length}));
  const maxZone=Math.max(...zoneCounts.map(z=>z.v),1);

  return `
  <!-- Banner -->
  <div class="banner mb" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <span>⚑ <b>${t("today")}:</b> ${totalOrders} orders · ${totalVeh} vehicles · ${activeVeh} active · OTIF ${otifPct}% · ${os.unassigned} pending assignment</span>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${_planResult?`<span class="tag" style="background:#3fae2a1a;color:#2f8a1f">Plan active · ${_planResult.length} assigned</span>`:""}
      <button class="btn c" style="font-size:11px;padding:5px 12px" onclick="nav('planning')">⟳ Plan Board</button>
      <button class="btn g" style="font-size:11px;padding:5px 12px" onclick="nav('map')">◉ Live Map</button>
    </div>
  </div>

  <!-- KPI Row (8 cards, all dynamic) -->
  <div class="row mb">
    ${kpi(t("k_orders"),totalOrders,`${totalOrders-os.unassigned} active`,true,"--green")}
    ${kpi(t("k_transit"),os.transit,"orders on road",os.transit>0,"--cyan")}
    ${kpi(t("k_delivered"),os.delivered,`${otifPct}% of total`,os.delivered>0,"--green")}
    ${kpi(t("k_delayed"),os.delayed,os.delayed>0?"action needed":"on track",os.delayed===0,"--amber")}
    ${kpi(t("k_unassigned"),os.unassigned,os.unassigned>0?"plan now":"all assigned",os.unassigned===0,"--grey")}
    ${kpi("Fleet Active",activeVeh,`${fs.idle} idle · ${fs.maint} maint`,activeVeh>0,"--blue")}
    ${kpi(t("k_otif"),otifPct+"%","On time in full",otifPct>70,"--green")}
    ${kpi("Utilization",utilPct+"%",`${totalVeh} vehicles total`,utilPct>0,"--cyan")}
  </div>

  <!-- Main section: Live Map + Pipeline/Alerts -->
  <div class="grid mb" style="grid-template-columns:1.6fr 1fr;gap:16px">

    <!-- Live Fleet Map with sidebar -->
    <div class="card" style="overflow:hidden">
      <div class="card-h">
        <h3>Live Fleet Map</h3>
        <div class="act">
          <span class="tag" style="background:#00abc71a;color:var(--cyan)">${fs.transit} transit</span>
          <span class="tag" style="background:#3fae2a1a;color:#2f8a1f">${fs.loading} loading</span>
          <span class="tag">${fs.idle} idle</span>
          <a class="tag" style="cursor:pointer;color:#1a6b7c" onclick="nav('map')">Full map →</a>
        </div>
      </div>
      <div style="display:flex;height:auto;min-height:360px;max-height:550px">
        <!-- Vehicle list sidebar -->
        <div style="width:195px;flex:0 0 195px;overflow-y:auto;border-right:1px solid var(--line)">
          ${VEH.map(v=>{const vc=cssv(STATUS[v.st].c);return`<div onclick="nav('map')" style="padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer" onmouseenter="this.style.background='#f6fbf8'" onmouseleave="this.style.background=''">
            <div style="display:flex;align-items:center;gap:7px">
              <span style="width:9px;height:9px;border-radius:50%;background:${vc};flex:0 0 9px;box-shadow:${v.st==="transit"?"0 0 0 3px "+vc+"30":"none"}"></span>
              <div style="min-width:0;flex:1">
                <div style="font-size:11.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.id}</div>
                <div style="font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.drv}</div>
                <div style="font-size:10px;font-weight:600;color:${vc}">${LANG==="ar"?STATUS[v.st].ar:STATUS[v.st].en}</div>
              </div>
            </div>
          </div>`}).join("")}
        </div>
        <!-- Google Maps with truck markers -->
        <div id="ctrlMapContainer" style="flex:1;overflow:hidden;position:relative">
          <iframe src="https://maps.google.com/maps?q=25.2854,51.5310&z=9&output=embed" width="100%" height="100%" style="border:0;display:block" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
    </div>

    <!-- Right column -->
    <div style="display:flex;flex-direction:column;gap:14px">

      <!-- Order Pipeline -->
      <div class="card">
        <div class="card-h"><h3>Order Pipeline</h3><span class="tag">${totalOrders} total</span></div>
        <div class="pad" style="padding-bottom:10px">
          ${[["unassigned","Unassigned",os.unassigned,"--grey"],["planned","Planned",os.planned,"--blue"],
             ["transit","In Transit",os.transit,"--cyan"],["delivered","Delivered",os.delivered,"--green"],
             ["delayed","Delayed",os.delayed,"--amber"],["exception","Exception",os.exception,"--red"]
          ].map(([st,lbl,n,col])=>{const pct=Math.round(n/totalOrders*100);const vc=cssv(col);return`<div style="margin-bottom:8px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:${vc}"></span>
                <span style="font-size:12px;color:var(--txt)">${lbl}</span>
              </div>
              <span style="font-size:12px;font-weight:700;color:var(--ink)">${n}<span style="font-size:10px;font-weight:400;color:var(--mut);margin-inline-start:4px">${pct}%</span></span>
            </div>
            <div class="prog"><i style="width:${Math.max(pct,n>0?2:0)}%;background:${vc}"></i></div>
          </div>`;}).join("")}
        </div>
      </div>

      <!-- Live Alerts -->
      <div class="card" style="flex:1;min-height:0">
        <div class="card-h"><h3>${t("liveAlerts")}</h3>
          <span class="tag" style="background:#e2473d1a;color:#e2473d">${critCount} critical</span>
          <span class="tag">${topAlerts.length} total</span>
        </div>
        <div style="overflow-y:auto;max-height:230px">
          ${topAlerts.length===0
            ?`<div class="pad" style="text-align:center;color:var(--mut);padding:24px 0">✔ All clear — no active alerts</div>`
            :topAlerts.map(a=>`<div class="alert"><span class="ad" style="background:${cssv(a[0])}"></span><div><div class="at">${a[1]}</div><div class="as">${a[2]}</div></div><span class="tm">${a[3]}</span></div>`).join("")}
        </div>
      </div>
    </div>
  </div>

  <!-- Middle row: Active Tours + Fleet Status + Driver Summary -->
  <div class="grid mb" style="grid-template-columns:1.4fr 1fr 1fr;gap:16px">

    <!-- Active Tours -->
    <div class="card">
      <div class="card-h">
        <h3>Active Tours</h3>
        <span class="tag" style="background:#00abc71a;color:var(--cyan)">${activeVeh} running</span>
        <a class="tag" style="cursor:pointer;color:#1a6b7c;margin-inline-start:auto" onclick="nav('planning')">Timeline →</a>
      </div>
      <div style="overflow-y:auto;max-height:260px">
        ${VEH.filter(v=>v.st==="transit"||v.st==="loading").map((v,i)=>{
          const col=typeof TOUR_COLORS!=="undefined"?TOUR_COLORS[i%TOUR_COLORS.length]:"#1a6b7c";
          const prog=Math.round(22+i*9+(i%3)*7);
          return`<div style="padding:10px 14px;border-bottom:1px solid var(--line)">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span style="background:${col};color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800;flex:0 0 auto">T${i+1}</span>
              <span style="font-size:12px;font-weight:700;color:var(--ink)">${v.id}</span>
              <span style="margin-inline-start:auto;font-size:11px;font-weight:700;color:${col}">${prog}%</span>
            </div>
            <div style="font-size:11px;color:var(--mut);margin-bottom:5px">${v.drv} · ${v.type} · ${v.zone}</div>
            <div class="prog"><i style="width:${prog}%;background:${col}"></i></div>
            <div style="display:flex;gap:12px;font-size:10px;color:var(--mut);margin-top:4px">
              <span>Speed: <b style="color:var(--ink)">${v.spd}</b></span>
              <span>Load: <b style="color:var(--ink)">${v.cap}</b></span>
            </div>
          </div>`;
        }).join("")}
        ${activeVeh===0?`<div class="pad" style="text-align:center;color:var(--mut);padding:28px 0">No active tours<br><small>Run Optimize → Auto-Dispatch to start</small></div>`:""}
      </div>
    </div>

    <!-- Fleet Breakdown -->
    <div class="card">
      <div class="card-h"><h3>${t("fleetStatus")}</h3><span class="tag">${totalVeh} vehicles</span></div>
      <div class="pad">
        ${["transit","loading","idle","maint"].map(s=>{const n=fs[s];const vc=cssv(STATUS[s].c);return`<div style="margin-bottom:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <div style="display:flex;align-items:center;gap:7px">
              <span style="width:9px;height:9px;border-radius:50%;background:${vc};display:inline-block"></span>
              <span style="font-size:12px;color:var(--txt)">${LANG==="ar"?STATUS[s].ar:STATUS[s].en}</span>
            </div>
            <b style="font-size:13px;color:var(--ink)">${n}<span style="font-size:10px;font-weight:400;color:var(--mut)"> / ${totalVeh}</span></b>
          </div>
          <div class="prog"><i style="width:${Math.round(n/totalVeh*100)}%;background:${vc}"></i></div>
        </div>`;}).join("")}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
          ${[["GWC Owned",VEH.filter(v=>!v.own||v.own!=="3rd Party").length],["3rd Party",VEH.filter(v=>v.own==="3rd Party").length||1]].map(([l,n])=>`<div style="text-align:center;border:1px solid var(--line);border-radius:8px;padding:8px"><div style="font-size:18px;font-weight:800;color:#1a6b7c">${n}</div><div style="font-size:10px;color:var(--mut)">${l}</div></div>`).join("")}
        </div>
      </div>
    </div>

    <!-- Driver Summary -->
    <div class="card">
      <div class="card-h"><h3>Driver Summary</h3><span class="tag">${DRV.length} drivers</span></div>
      <div class="pad">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px">
          ${[["Active",DRV.filter(d=>d.hrs>0).length,"--cyan"],
             ["Night Qual.",DRV.filter(d=>d.night).length,"--green"],
             ["Hrs ≥ 9h",DRV.filter(d=>d.hrs>=9).length,"--red"],
             ["Insp Due",DRV.filter(d=>d.insp!=="OK").length,"--amber"]
          ].map(([l,n,col])=>`<div style="text-align:center;border:1px solid var(--line);border-radius:8px;padding:8px">
            <div style="font-size:20px;font-weight:800;color:${cssv(col)}">${n}</div>
            <div style="font-size:10px;color:var(--mut)">${l}</div>
          </div>`).join("")}
        </div>
        ${DRV.map(d=>{const over=d.hrs>=10;const warn=d.hrs>=9&&d.hrs<10;const dc=over?cssv("--red"):warn?cssv("--amber"):cssv("--green");return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1a6b7c,var(--cyan));color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 26px">${d.n.charAt(0)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.n}</div>
            <div class="prog" style="margin-top:2px"><i style="width:${d.hrs/11*100}%;background:${dc}"></i></div>
          </div>
          <span style="font-size:11px;font-weight:700;color:${dc};flex:0 0 auto">${d.hrs}h</span>
        </div>`;}).join("")}
        <a style="font-size:11px;color:#1a6b7c;cursor:pointer;font-weight:600" onclick="nav('safety')">Full safety report →</a>
      </div>
    </div>
  </div>

  <!-- Bottom row: Zone performance + OTIF + Utilization -->
  <div class="grid" style="grid-template-columns:1.8fr 1fr 1fr;gap:16px">

    <!-- Zone performance -->
    <div class="card">
      <div class="card-h"><h3>${t("ordersByZone")}</h3><span class="tag">${totalOrders} orders</span></div>
      <div class="pad">
        ${zoneCounts.map(z=>`<div style="margin-bottom:9px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="width:9px;height:9px;border-radius:2px;background:${ZONE_COLOR[z.z]||"#1a6b7c"};display:inline-block"></span>
              <span style="font-size:12px;color:var(--txt)">${z.z}</span>
            </div>
            <b style="font-size:12px;color:var(--ink)">${z.v}</b>
          </div>
          <div class="prog"><i style="width:${Math.round(z.v/maxZone*100)}%;background:${ZONE_COLOR[z.z]||"#1a6b7c"}"></i></div>
        </div>`).join("")}
        <div class="note">Live order distribution across Qatar delivery zones.</div>
      </div>
    </div>

    <div class="card pad" style="text-align:center">
      <div class="muted mb" style="font-size:12px;font-weight:700">${t("k_otif")}</div>
      ${donut(Math.max(otifPct,10),"On time in full")}
      <div style="font-size:11px;color:var(--mut);margin-top:8px">${os.delivered} of ${totalOrders} delivered</div>
    </div>

    <div class="card pad" style="text-align:center">
      <div class="muted mb" style="font-size:12px;font-weight:700">${t("k_util")}</div>
      ${donut(Math.max(utilPct,8),"Active fleet")}
      <div style="font-size:11px;color:var(--mut);margin-top:8px">${activeVeh} of ${totalVeh} vehicles active</div>
    </div>
  </div>`;
  if(VIEW==="control") setTimeout(()=>addTruckMarkers("ctrlMapContainer"),800);
}

/* ---- Orders ---- */
function vOrders(){
  return `
  <div class="between mb">
    <div class="flex" style="flex-wrap:wrap;gap:8px">
      ${["all","transit","delayed","unassigned","delivered"].map((f,i)=>`<span class="pill ${i===0?"on":""}" onclick="filterOrders(this,'${f}')">${f==="all"?t("all"):(STATUS[f]?(LANG==="ar"?STATUS[f].ar:STATUS[f].en):f)}</span>`).join("")}
    </div>
    <div class="flex">
      <div class="ord-search"><span class="si">⌕</span><input id="ordSearch" placeholder="Search order, customer, route…" oninput="searchOrders(this.value)"/></div>
      <button class="btn g">${t("export")}</button>
      <button class="btn c" onclick="openQuickOrder()">⚡ Quick Order</button>
      <button class="btn p" onclick="openNewOrderModal()">+ ${t("newOrder")}</button>
    </div>
  </div>
  <div class="card"><table id="ordTable"><thead><tr>
    <th>${t("th_order")}</th><th>${t("th_customer")}</th><th>${t("th_route")}</th><th>${t("th_stops")}</th><th>${t("th_weight")}</th><th>${t("th_priority")}</th><th>${t("th_eta")}</th><th>${t("th_status")}</th></tr></thead>

                ${assigned?`<div style="font-size:11px;color:var(--green);font-weight:700;margin-top:6px">✓ ${assigned.vid} — ${assigned.drv}</div>`:""}
              </div>`}).join("")}
        </div>
      </div>
      <div>
        ${idle.length>0?`<div class="card mb"><div class="card-h"><h3>Idle — available</h3><span class="tag" style="background:#3fae2a1a;color:#2f8a1f">${idle.length} ready</span></div><div class="pad" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${idle.map(v=>`<div style="border:1px solid var(--line);border-radius:10px;padding:12px;background:#fff">
            <div class="between mb"><b>${v.id}</b>${chip(v.st)}</div>

            <div style="font-size:11px;color:var(--green);font-weight:700;margin-top:4px">${(tonnage(v.type)*(1-v.util/100)).toFixed(1)}t available</div>

        <div class="card"><div class="card-h"><h3>${t("routes")}</h3><span class="tag" style="background:rgba(0,171,199,.1);color:var(--cyan)">${active.length} active</span></div>
          <div class="pad" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:380px;overflow:auto">

              <div class="between mb"><b>${v.id}</b>${chip(v.st)}</div>

function setPlanTab(tab){_planTab=tab;render();}
function tonnage(type){const m=type.match(/(\d+)t/);return m?parseInt(m[1]):7;}
function parseWt(wt){const m=wt.match(/([\d.]+)/);return m?parseFloat(m[1]):1;}

/* Zone colour map + tour colour palette */
const ZONE_COLOR={"Doha Central":"#1a6b7c","West Bay / Lusail":"#3FAE2A","Industrial Area":"#00ABC7","Al Wakrah":"#f5a623","Hamad Port":"#2f86d6","Al Rayyan":"#9c27b0","Mesaieed":"#e2473d"};
const TOUR_COLORS=["#1a6b7c","#3FAE2A","#00ABC7","#f5a623","#2f86d6","#9c27b0","#e2473d","#00897b","#d32f2f","#1976d2","#388e3c","#f57c00","#5d4037","#0097a7","#c2185b","#689f38"];
const ZONE_COORDS={"Doha Central":[25.2860,51.5340],"West Bay / Lusail":[25.4130,51.4880],"Industrial Area":[25.1630,51.5730],"Al Wakrah":[25.1660,51.6000],"Hamad Port":[24.9600,51.5570],"Al Rayyan":[25.2600,51.4240],"Mesaieed":[24.9880,51.5540]};
// Stable seeded positions: each vehicle gets a fixed lat/lng offset from its zone centre
(function(){
  function sr(s){return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/4294967295;};}
  VEH.forEach((v,i)=>{
    const rng=sr(i*7919+97);
    const b=ZONE_COORDS[v.zone]||[25.2854,51.5310];
    v._lat=+(b[0]+(rng()-.5)*.10).toFixed(5);
    v._lng=+(b[1]+(rng()-.5)*.10).toFixed(5);
  });
  // Flag two transit vehicles as "delayed" for live demo
  VEH[1]._delayed=true;  // GWC-3088
  VEH[3]._delayed=true;  // GWC-3066
})();

/* Build deterministic tours — plan result PLUS already-active vehicles */
function buildTours(result){
  const START=7*60;

  // --- Newly optimised tours ---
  const byVeh={};
  (result||[]).forEach(a=>{
    if(!byVeh[a.vid])byVeh[a.vid]={vid:a.vid,drv:a.drv,zone:a.zone||"",orders:[]};
    byVeh[a.vid].orders.push(a);
  });
  const planTours=Object.values(byVeh).map((tour,i)=>{
    const v=VEH.find(x=>x.id===tour.vid);
    const color=TOUR_COLORS[i%TOUR_COLORS.length];
    let cursor=START+15+i*8;
    const blocks=[];
    tour.orders.forEach((a,j)=>{
      cursor+=18+j*5+i*3;
      const dwell=12+j*3+i*2;
      blocks.push({oid:a.oid,start:cursor,duration:dwell});
      cursor+=dwell;
    });
    const distKm=18+i*14+tour.orders.length*8;
    const totalWt=tour.orders.reduce((s,a)=>{const o=ORDERS.find(x=>x.id===a.oid);return s+(o?parseWt(o.wt):0);},0);
    return{tid:i+1,vid:tour.vid,drv:tour.drv,color,v,blocks,distKm,wt:totalWt.toFixed(1),source:"plan",zone:tour.zone||v?.zone||""};
  });

  // --- Already active / transit vehicles ---
  const activeTours=VEH.filter(v=>v.st==="transit"||v.st==="loading").map((v,i)=>{
    const ci=planTours.length+i;
    const color=TOUR_COLORS[ci%TOUR_COLORS.length];
    const nStops=4+i*2;
    const transitOrders=ORDERS.filter(o=>o.status==="transit");
    let cursor=START+25+i*14;
    const blocks=[];
    for(let j=0;j<nStops;j++){
      cursor+=16+j*5+i*3;
      const dwell=10+j*3;
      const ref=transitOrders[j%Math.max(1,transitOrders.length)];
      blocks.push({oid:ref?ref.id:`IN-${v.id}-${j+1}`,start:cursor,duration:dwell,active:true});
      cursor+=dwell;
    }
    const distKm=Math.round(v.util*0.9+22);
    const wt=(tonnage(v.type)*v.util/100).toFixed(1);
    return{tid:planTours.length+i+1,vid:v.id,drv:v.drv,color,v,blocks,distKm,wt,source:"active",zone:v.zone};
  });

  return[...planTours,...activeTours];
}

/* Single Gantt row */
/* P8 — per-tour capacity utilisation */
function tourUtil(tour){
  const cap=tonnage(tour.v?.type||"7t")||7;
  const loadWt=parseFloat(tour.wt)||0;
  const nStops=tour.blocks.length;
  const wPct=Math.min(99,Math.round(loadWt/cap*100));
  const vPct=Math.min(99,Math.max(6,Math.round(wPct*0.92)+(tour.tid%3)*3));
  const pPct=Math.min(99,Math.max(6,Math.round(wPct*0.88)+(nStops%4)*2));
  const remain=Math.max(0,cap-loadWt).toFixed(1);
  return{cap,loadWt,wPct,vPct,pPct,remain};
}
function ganttRow(tour,ti,START,SPAN){
  const nStops=tour.blocks.length;
  const routeStart=tour.blocks[0]?.start??START;
  const routeEnd=(tour.blocks[nStops-1]?.start??START)+(tour.blocks[nStops-1]?.duration??0);
  const rLeft=Math.max(0,(routeStart-START)/SPAN*100);
  const rWidth=Math.max(1,(routeEnd-routeStart)/SPAN*100);
  const overflowCount=Math.max(0,nStops-20);
  return`<div class="gtour" onclick="openTourTimeline(${ti})">
    <div class="gtour-info">
      <span style="background:${tour.color};color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;flex:0 0 auto;white-space:nowrap">Tour ${tour.tid}</span>
      <div style="min-width:0;overflow:hidden;flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:11px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tour.v?tour.v.type:"Vehicle"}</div>
          <span style="font-size:10px;font-weight:700;color:var(--mut);flex:0 0 auto;margin-inline-start:4px">${nStops}</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;margin-top:1px">
          <span style="color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tour.drv}</span>
          ${overflowCount?`<span style="background:#eee;border-radius:9px;padding:0 5px;font-weight:700;color:var(--mut);flex:0 0 auto">+${overflowCount}</span>`:""}
        </div>
        <div style="font-size:10px;color:var(--mut);margin-top:1px">
          <span style="margin-inline-end:8px">&#x1F4CD; ${tour.distKm} km</span><span>&#x2696; ${tour.wt} t</span>

function optimizeRoutes(){
  const idle=VEH.filter(v=>v.st==="idle");
  const unassigned=ORDERS.filter(o=>o.status==="unassigned")
    .sort((a,b)=>({High:0,Normal:1,Low:2}[a.pr]-{High:0,Normal:1,Low:2}[b.pr]));
  if(!idle.length){alert("No idle vehicles available. Add trucks in Fleet & Resources.");return;}
  if(!unassigned.length){alert("No unassigned orders to optimize.");return;}

  // Stop-count based packing: each vehicle gets 5–12 stops depending on zone/type
  const MAX_STOPS=12; // max deliveries per tour
  const MIN_STOPS=5;  // aim for at least 5 per truck
  const slots=idle.map(v=>({v,avail:tonnage(v.type)*(1-v.util/100)+8})); // loose capacity
  const assigned=new Set();
  const result=[];
  const pending=[...unassigned]; // work through in priority order

  for(const s of slots){
    if(assigned.size>=pending.length)break;
    let used=0,stops=0;
    for(const o of pending){
      if(assigned.has(o.id))continue;
      if(stops>=MAX_STOPS)break;
      const w=parseWt(o.wt);
      if(used+w<=s.avail){
        result.push({oid:o.id,vid:s.v.id,drv:s.v.drv,zone:s.v.zone});
        assigned.add(o.id);
        used+=w;
        stops++;
      }
    }
    // If truck has fewer than MIN_STOPS, grab lighter orders from remaining
    if(stops<MIN_STOPS){
      for(const o of pending){
        if(assigned.has(o.id))continue;
        if(stops>=MIN_STOPS)break;
        const w=parseWt(o.wt);
        if(w<=2){
          result.push({oid:o.id,vid:s.v.id,drv:s.v.drv,zone:s.v.zone});
          assigned.add(o.id);
          stops++;
        }
      }
    }
  }

  if(!result.length){alert("No orders could be assigned. Add more trucks or unassigned orders.");return;}
  assigned.forEach(id=>{const o=ORDERS.find(x=>x.id===id);if(o)o.status="planned";});
  _planResult=result;_dispatched=false;_tourData=buildTours(result);_planTab="orders";render();
}
function autoDispatch(){
  if(!_planResult||!_planResult.length){alert("Run Optimize first.");return;}
  const assignedOids=new Set(_planResult.map(a=>a.oid));
  const assignedVids=new Set(_planResult.map(a=>a.vid));
  ORDERS.forEach(o=>{if(assignedOids.has(o.id)){o.status="transit";o.eta=(10+Math.floor(Math.random()*5))+":"+(Math.floor(Math.random()*6)*10||"00");}});
  VEH.forEach(v=>{if(assignedVids.has(v.id)){v.st="transit";v.spd=(50+Math.floor(Math.random()*35))+" km/h";v.util=60+Math.floor(Math.random()*30);v.cap=v.util+"%";}});
  _dispatched=true;_planTab="timeline";render();
}

/* ---- VTS: Live Map ---- */
let selVeh=null;
function addTruckMarkers(containerId){
  const container=document.getElementById(containerId);
  if(!container) return;
  const overlay=document.createElement("div");
  overlay.className="map-overlay";
  container.appendChild(overlay);
  const ST_COL={transit:"#00ABC7",delayed:"#e2473d",maint:"#f5a623",loading:"#2f86d6",idle:"#9aa7ad"};
  VEH.forEach((v,idx)=>{
    const marker=document.createElement("div");
    marker.className="truck-marker";
    marker.style.color=ST_COL[v.st];
    marker.textContent="🚛";
    const hash=v.id.charCodeAt(0)+v.id.charCodeAt(1);
    const pctX=15+(hash%70);
    const pctY=20+((hash*7)%70);
    marker.style.left=pctX+"%";
    marker.style.top=pctY+"%";
    marker.title=v.id;
    marker.onclick=(e)=>{
      e.stopPropagation();
      const ord=ORDERS.find(o=>o.from===v.zone);
      const popup=document.createElement("div");
      popup.className="truck-popup";
      popup.style.left=Math.min(e.clientX+10,window.innerWidth-280)+"px";
      popup.style.top=Math.min(e.clientY+10,window.innerHeight-200)+"px";
      popup.innerHTML=`<button class="truck-popup-close" onclick="this.parentElement.remove()">×</button>
        <b style="color:${ST_COL[v.st]};font-size:13px">${v.id}</b><br/><small>${v.drv}</small><br/><span style="color:${ST_COL[v.st]};font-weight:700;font-size:11px">${v.st.toUpperCase()}</span>${ord?`<hr style="margin:6px 0;border:none;border-top:1px solid #eee"/><b style="font-size:11px">Order:</b> ${ord.id}<br/><b style="font-size:11px">From:</b> ${ord.from}<br/><b style="font-size:11px">To:</b> ${ord.to}<br/><b style="font-size:11px">Amt:</b> ${ord.amt}`:""}`;
      document.body.appendChild(popup);
      selVeh=v.id;
    };
    overlay.appendChild(marker);
  });
}
function vMap(){
  const stCounts={transit:0,delayed:0,loading:0,maint:0,idle:0};
  VEH.forEach(v=>{const k=v._delayed?"delayed":v.st;if(k in stCounts)stCounts[k]++;else stCounts.idle++;});
  return `<div style="display:flex;gap:16px;height:calc(100vh - 110px);width:100%">
    <!-- Vehicle sidebar -->
    <div class="card" style="width:260px;flex:0 0 260px;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--line)">
        <div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px">Fleet · ${VEH.length} vehicles</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${[["transit","#00ABC7","Transit"],["delayed","#e2473d","Delayed"],["loading","#2f86d6","Loading"],["maint","#f5a623","Maint"],["idle","#9aa7ad","Idle"]].map(([k,c,l])=>stCounts[k]?`<span style="font-size:10px;padding:2px 7px;border-radius:8px;background:${c}22;color:${c};font-weight:700">${stCounts[k]} ${l}</span>`:"").join("")}
        </div>
      </div>
      <div id="vehDetail" style="display:none;border-bottom:1px solid var(--line);padding:12px 16px;background:#f0faf4"></div>
      <div style="flex:1;overflow:auto">
        ${VEH.map(v=>{
          const effSt=v._delayed?"delayed":v.st;
          const c=effSt==="delayed"?"#e2473d":cssv(STATUS[v.st]?.c||"--grey");
          return `<div class="veh-row" id="vrow_${v.id}" onclick="selVehicle('${v.id}')" style="padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px">
            <span style="width:10px;height:10px;border-radius:50%;background:${c};flex:0 0 10px;box-shadow:${effSt==="transit"||effSt==="delayed"?"0 0 0 3px "+c+"30":"none"}"></span>
            <div style="flex:1;min-width:0">
              <div style="font-size:12.5px;font-weight:700;color:var(--ink)">${v.id}</div>
              <div style="font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.drv} · ${v.zone}</div>
            </div>
            ${chip(effSt)}
          </div>`;
        }).join("")}
      </div>
      <div style="padding:8px 14px;font-size:11px;color:var(--mut);border-top:1px solid var(--line)">Click a vehicle or map marker to view trip</div>
    </div>
    <!-- Google Maps with truck markers -->
    <div id="liveMapContainer" style="flex:1;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);position:relative">
      <iframe title="Qatar Live Map" src="https://maps.google.com/maps?q=25.2854,51.5310&z=9&output=embed" width="100%" height="100%" style="border:0;display:block" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>`;
  if(VIEW==="map") setTimeout(()=>addTruckMarkers("liveMapContainer"),800);
}
function selVehicle(id){
  selVeh=id;
  document.querySelectorAll(".veh-row").forEach(e=>e.style.background="");
  const row=document.getElementById("vrow_"+id);if(row){row.style.background="#f0faf4";row.scrollIntoView({block:"nearest"});}
  const v=VEH.find(x=>x.id===id);if(!v)return;
  const effSt=v._delayed?"delayed":v.st;
  const c=effSt==="delayed"?"#e2473d":cssv(STATUS[v.st]?.c||"--grey");
  const det=document.getElementById("vehDetail");

function openVehicleTripDrawer(id){
  const v=VEH.find(x=>x.id===id);if(!v)return;
  const effSt=v._delayed?"delayed":v.st;
  const stCol={transit:"#00ABC7",delayed:"#e2473d",loading:"#2f86d6",maint:"#f5a623",idle:"#9aa7ad"}[effSt]||"#9aa7ad";
  const isActive=effSt==="transit"||effSt==="delayed"||effSt==="loading";
  function sr(s){return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}
  function vhash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0x7fffffff;return h;}
  const rng=sr(vhash(id));
  const DEMO_STOPS=[
    {addr:"Al Meera Hypermarket, Doha Central",zone:"Doha Central"},
    {addr:"LuLu Hypermarket, Lusail City",zone:"West Bay / Lusail"},
    {addr:"IKEA Qatar, Festival City",zone:"Industrial Area"},
    {addr:"Woqod Distribution Hub",zone:"Al Wakrah"},
    {addr:"Hamad Port CFS Terminal",zone:"Hamad Port"},
    {addr:"Carrefour Al Rayyan Mall",zone:"Al Rayyan"},
    {addr:"Qatar Steel, Mesaieed Ind.",zone:"Mesaieed"},
    {addr:"Barwa Commercial Avenue",zone:"West Bay / Lusail"},
    {addr:"GWC Logistics Hub, Doha",zone:"Doha Central"},
    {addr:"Industrial Area Depot 7",zone:"Industrial Area"},
    {addr:"Al Wakrah Central Depot",zone:"Al Wakrah"},
    {addr:"QP Logistics Base",zone:"Mesaieed"}
  ];
  const numStops=isActive?2+Math.floor(rng()*3):1;
  const stops=[];const used=new Set();
  for(let i=0;i<numStops;i++){let si;let tries=0;do{si=Math.floor(rng()*DEMO_STOPS.length);tries++;}while(used.has(si)&&tries<20);used.add(si);stops.push(DEMO_STOPS[si]);}
  const progressPct=isActive?(effSt==="delayed"?25+Math.floor(rng()*30):50+Math.floor(rng()*40)):v.st==="delivered"?100:0;
  const doneStops=isActive?Math.floor(progressPct/100*stops.length):0;
  const startMin=7*60+10+Math.floor(rng()*20);
  function fmtT(m){return(Math.floor(m/60)%24).toString().padStart(2,"0")+":"+(m%60).toString().padStart(2,"0");}
  const events=[];
  if(isActive){
    events.push({ic:"🟢",col:"#3FAE2A",label:"Trip started · "+v.zone+" Depot",time:fmtT(startMin),done:true});
    stops.forEach((s,i)=>{
      const mn=startMin+45+i*65+Math.floor(rng()*25);
      const done=i<doneStops;
      events.push({ic:done?"✅":"⏳",col:done?"#3FAE2A":"#9aa7ad",label:(done?`Delivered — `:`En route to `)+s.addr,time:fmtT(mn),done});
    });
    if(effSt==="delayed")events.push({ic:"⚠️",col:"#e2473d",label:"Delay alert — heavy traffic on route",time:"Now",done:true});
    else if(effSt==="loading")events.push({ic:"🏗️",col:"#2f86d6",label:"Loading in progress at depot",time:"Now",done:true});
  }else if(v.st==="maint"){
    events.push({ic:"⚙️",col:"#f5a623",label:"Scheduled maintenance in progress",time:"Since 06:00",done:true});
    events.push({ic:"🔧",col:"#f5a623",label:"Engine + brake inspection",time:"Est. complete: 14:00",done:false});
  }else{
    events.push({ic:"⏸",col:"#9aa7ad",label:"Vehicle available · awaiting assignment",time:"Standby",done:false});
  }
  const etaMn=startMin+60*(stops.length+1)+Math.floor(rng()*25);
  const eta=isActive?fmtT(etaMn):"—";
  openDrawer(`<div class="dh">
    <div><div style="font-size:11px;color:var(--mut)">Trip Execution · ${v.type}</div><b style="font-size:17px;color:var(--ink)">${v.id}</b></div>
    ${chip(effSt)}<button class="x" onclick="closeDrawer()">×</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 20px;border-bottom:1px solid var(--line);background:#f8fafb">
    <div style="text-align:center"><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Driver</div><b style="font-size:12px">${v.drv}</b></div>
    <div style="text-align:center"><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Speed</div><b style="font-size:12px;color:${stCol}">${v.spd}</b></div>
    <div style="text-align:center"><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Load</div><b style="font-size:12px">${v.cap}</b></div>
    <div style="text-align:center"><div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">ETA Final</div><b style="font-size:12px">${eta}</b></div>
  </div>
  ${isActive?`<div style="padding:14px 20px;border-bottom:1px solid var(--line)">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-bottom:6px"><span>Trip Progress</span><b style="color:${stCol}">${progressPct}%</b></div>
    <div style="height:8px;border-radius:4px;background:var(--line);overflow:hidden"><div style="height:100%;width:${progressPct}%;background:${effSt==="delayed"?"linear-gradient(90deg,#f5a623,#e2473d)":"linear-gradient(90deg,#00ABC7,#3FAE2A)"};border-radius:4px"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-top:4px"><span>Depot</span><span>${doneStops}/${stops.length} stops done</span><span>Final drop</span></div>
  </div>`:""}
  <div style="padding:14px 20px;border-bottom:1px solid var(--line)">
    <div style="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Stop List (${stops.length})</div>
    ${stops.map((s,i)=>{
      const done=i<doneStops;const active=i===doneStops&&isActive;
      return`<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:6px">
        <div style="display:flex;flex-direction:column;align-items:center">
          <div style="width:22px;height:22px;border-radius:50%;background:${done?"#3FAE2A":active?"#00ABC7":"var(--line)"};display:flex;align-items:center;justify-content:center;color:${done||active?"#fff":"var(--mut)"};font-size:10px;font-weight:700;flex:0 0 22px">${done?"✓":i+1}</div>
          ${i<stops.length-1?`<div style="width:2px;height:20px;background:${done?"#3FAE2A":"var(--line)"}"></div>`:""}
        </div>
        <div style="flex:1;padding-bottom:2px">
          <div style="font-size:12.5px;font-weight:${active?700:500};color:${done?"var(--mut)":"var(--ink)"}">${s.addr}</div>
          <div style="font-size:10.5px;color:var(--mut)">${s.zone} · ${done?"Delivered ✓":active?"En route →":"Pending"}</div>
        </div>
      </div>`;
    }).join("")}
  </div>
  <div style="padding:14px 20px">
    <div style="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Activity Log</div>
    ${events.map(e=>`<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:9px">
      <div style="width:28px;height:28px;border-radius:50%;background:${e.col}20;display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 28px">${e.ic}</div>
      <div style="flex:1"><div style="font-size:12px;font-weight:${e.done?600:400};color:${e.done?"var(--ink)":"var(--mut)"}">${e.label}</div><div style="font-size:10px;color:var(--mut)">${e.time}</div></div>
    </div>`).join("")}
  </div>`);
}

let _planLeafletMap=null;
function initPlanBoardMap(){
  const el=document.getElementById("planMap");
  if(!el||typeof L==="undefined")return;
  if(_planLeafletMap){try{_planLeafletMap.remove();}catch(e){}_planLeafletMap=null;}
  _planLeafletMap=L.map("planMap",{center:[25.2854,51.5310],zoom:9,zoomControl:false,attributionControl:false});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(_planLeafletMap);
  if(_planResult){
    const byVid={};
    _planResult.forEach(a=>{if(!byVid[a.vid])byVid[a.vid]={vid:a.vid,orders:[]};byVid[a.vid].orders.push(a);});
    Object.values(byVid).forEach((tour,ti)=>{
      const col=TOUR_COLORS[ti%TOUR_COLORS.length];
      const v=VEH.find(x=>x.id===tour.vid);if(!v)return;
      const latlngs=[[v._lat||25.2854,v._lng||51.5310]];
      tour.orders.forEach(a=>{const o=ORDERS.find(x=>x.id===a.oid);if(o&&ZONE_COORDS[o.to])latlngs.push(ZONE_COORDS[o.to]);});
      if(latlngs.length>1)L.polyline(latlngs,{color:col,weight:2.5,opacity:.75,dashArray:"6,4"}).addTo(_planLeafletMap);
    });
  }
  const ST_COL={transit:"#00ABC7",loading:"#2f86d6",idle:"#9aa7ad",maint:"#f5a623",delayed:"#e2473d"};
  VEH.forEach(v=>{
    const pos=[v._lat||25.2854,v._lng||51.5310];
    const effSt=v._delayed?"delayed":v.st;
    const col=ST_COL[effSt]||"#9aa7ad";
    const icon=L.divIcon({
      className:"",
      html:`<div style="width:14px;height:14px;border-radius:50%;background:${col};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
      iconSize:[14,14],iconAnchor:[7,7]
    });
    L.marker(pos,{icon}).addTo(_planLeafletMap)
      .bindTooltip(`<b>${v.id}</b> — ${v.drv}`,{direction:"top",className:"lf-tip"})
      .on("click",()=>openVehicleTripDrawer(v.id));
  });
}

/* ---- VTS: Safety & Compliance ---- */
function vSafety(){
  const over10=DRV.filter(d=>d.hrs>=10).length;
  const warn9=DRV.filter(d=>d.hrs>=9&&d.hrs<10).length;
  const inspDue=DRV.filter(d=>d.insp==="Due").length;
  const inspOver=DRV.filter(d=>d.insp==="Overdue").length;
  const nightQ=DRV.filter(d=>d.night).length;
  const compliantPct=Math.round(DRV.filter(d=>d.hrs<10&&d.insp==="OK").length/DRV.length*100);
  return `<div class="row mb">
    ${kpi(t("complianceRate"),compliantPct+"%",`${DRV.filter(d=>d.hrs<10&&d.insp==="OK").length} of ${DRV.length} drivers`,compliantPct>85,"--green")}
    ${kpi(t("fatigue"),over10,over10>0?"immediate action":"none flagged",over10===0,"--red")}
    ${kpi("Hours 9–10h",warn9,warn9>0?"monitor closely":"clear","","--amber")}
    ${kpi(t("inspections"),inspDue+inspOver,`${inspDue} due · ${inspOver} overdue`,(inspDue+inspOver)===0,"--amber")}
    ${kpi(t("nightQual"),nightQ,`${nightQ} of ${DRV.length} qualified`,nightQ>0,"--cyan")}
    ${kpi("Violations Today",VIOL.length,`${VIOL.filter(v=>v.sev==="High").length} high severity`,VIOL.length===0,"--red")}</div>

  <table><thead><tr><th>${t("th_driver")}</th><th>License</th><th>${t("drivingHours")} (of 11h limit)</th><th>${t("nightQual")}</th><th>${t("inspections")}</th><th>Risk</th></tr></thead>
  <tbody>${DRV.map(d=>{const over=d.hrs>=10;const warn=d.hrs>=9&&d.hrs<10;const col=over?cssv("--red"):warn?cssv("--amber"):cssv("--green");
    const risk=over?`<span style="background:#e2473d1a;color:#e2473d;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">High</span>`:
                warn?`<span style="background:#f5a6231a;color:#b9791a;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">Medium</span>`:
                    `<span style="background:#3fae2a1a;color:#2f8a1f;padding:2px 8px;border-radius:10px;font-size:10px">Low</span>`;
    return `<tr><td><b>${d.n}</b></td><td class="muted">${d.lic}</td>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="prog" style="width:120px"><i style="width:${d.hrs/11*100}%;background:${col}"></i></div><span style="color:${col};font-weight:700">${d.hrs}h</span></div></td>
    <td>${d.night?`<span class="tag" style="background:#3fae2a1a;color:#2f8a1f">Yes</span>`:`<span class="tag">No</span>`}</td>
    <td>${d.insp==="OK"?`<span class="tag" style="background:#3fae2a1a;color:#2f8a1f">OK</span>`:d.insp==="Due"?`<span class="tag" style="background:#f5a6231a;color:#b9791a">Due</span>`:`<span class="tag" style="background:#e2473d1a;color:#e2473d">Overdue</span>`}</td>
    <td>${risk}</td></tr>`;}).join("")}</tbody></table>
  <div class="pad note">Daily hours auto-reset at midnight. Drivers at ≥9h flagged for monitoring; ≥10h flagged for immediate fatigue risk.</div></div>`;
}

/* ---- Dynamic wizard orchestration (replaces old 10-step flow) ---- */
function renderWiz(){
  if(_wiz.phase==="service"){showModal(_wizSvcScreen());return;}
  const flow=SVC_FLOWS[_wiz.svc];
  if(!flow){_wiz.phase="service";showModal(_wizSvcScreen());return;}
  const steps=flow.steps,stepId=steps[_wiz.flowStep]?.id||"review",isLast=_wiz.flowStep>=steps.length-1;
  const svc=WIZ_SVC.find(s=>s.id===_wiz.svc);
  showModal(`<div class="modal wiz-modal" onclick="event.stopPropagation()">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to right,#1a789610,var(--card))">
      <div>
        <div style="font-size:15px;font-weight:800;color:#1a7896">${svc?svc.icon+" ":""}${flow.label} — New Order</div>
        <div style="font-size:11px;color:var(--mut)">Step ${_wiz.flowStep+1} of ${steps.length} — <b>${steps[_wiz.flowStep]?.label||""}</b></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:10px;color:#2f8a1f;background:#f0fff4;padding:3px 10px;border-radius:10px;border:1px solid #3fae2a30">💾 Draft auto-saved</span>
        <button class="x" onclick="closeModal()">×</button>
      </div>
    </div>
    <div style="padding:10px 20px;border-bottom:1px solid var(--line);background:var(--card);overflow-x:auto">
      <div style="display:flex;align-items:center;gap:0;min-width:max-content">${_wfProgBar(steps)}</div>
    </div>
    <div class="wiz-body">${_wizStepContent(stepId)}</div>
    <div class="wiz-foot">
      <div style="display:flex;gap:8px">
        <button class="btn g" onclick="wizFlowBack()">← Back</button>
        <button class="btn g" onclick="alert('Draft saved — TO-'+(_nextOid+1))">💾 Draft</button>
      </div>
      <span style="font-size:11px;color:var(--mut)">Step ${_wiz.flowStep+1} / ${steps.length}</span>
      <div>${isLast?`<button class="btn p" onclick="wizSubmit()">✓ Create Order</button>`:`<button class="btn p" onclick="wizFlowNext()">Next →</button>`}</div>
    </div>
  </div>`);
}

/* P9 — apply a template: pre-fill service, vehicle, package, activities, temperature, then jump into the flow */
function wizApplyTemplate(id){
  const tpl=ORDER_TEMPLATES.find(t=>t.id===id);
  if(!tpl)return;
  _wiz.svc=tpl.svc;
  _wiz.equip=tpl.vehicle||null;
  _wiz.friendlyCargo=null;
  if(tpl.pkg)_wiz.rentalPackage=tpl.pkg;
  if(tpl.duration)_wiz.rentalDuration=tpl.duration;
  if(tpl.temp)_wiz.temperature=tpl.temp;
  if(tpl.acts&&tpl.acts.length)_wiz.deliveryActs=[...tpl.acts];
  _wiz.appliedTemplate=tpl.name;
  _wiz.phase="flow"; _wiz.flowStep=0;
  renderWiz();
}
function wizStartFlow(){if(!_wiz.svc)return;_wiz.phase="flow";_wiz.flowStep=0;renderWiz();}
function wizFlowNext(){const steps=SVC_FLOWS[_wiz.svc]?.steps||[];if(_wiz.flowStep<steps.length-1){_wiz.flowStep++;renderWiz();}}
function wizFlowBack(){if(_wiz.flowStep>0){_wiz.flowStep--;renderWiz();}else{_wiz.phase="service";renderWiz();}}
function _wfProgBar(steps){
  return steps.map((s,i)=>{
    const done=i<_wiz.flowStep,active=i===_wiz.flowStep,cls=done?"done":active?"active":"todo";
    return`<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
      <div class="wdot ${cls}">${done?"✓":i+1}</div>
      <span class="wlbl ${active?"active":""}" style="font-size:10.5px">${s.label}</span>
    </div>${i<steps.length-1?`<div class="wconn ${done?"done":"todo"}"></div>`:""}`
  }).join("");
}
function _wizStepContent(id){
  return({customer:wfCustomer,vehicle:wfVehicle,package:wfPackage,duration:wfDuration,fleet_config:wfFleetConfig,locations:wfLocations,container_type:wfContainerType,handling:wfHandling,reefer_config:wfReeferConfig,cargo:wfCargo,activities:wfActivities,timewindows:wfTimeWindows,equipment:wfEquipment,permits:wfPermits,special:wfSpecial,customs:wfCustoms,review:wfReview}[id]||function(){return"";})();
}
